body:
  text: 論語述而第七何晏集觧舊卅九章今卅八章子曰述而不作信而好古竊比於我老彭苞氏曰老彭殷賢大夫也好述古事我若老彭矣伹述之耳也子曰黙而識之學而不厭誨人不倦何有於我哉鄭玄曰人無有是行於我我獨有之也子曰徳之不脩也學之不講也聞義不能從也不善不能改也是吾憂也孔安國曰夫子常以此四者爲憂也子之燕居申申如也夭夭如也馬融曰申申夭夭和舒之貌也子曰甚矣吾衰也乆矣吾不復夢見周公也孔安國曰孔子衰老不復夢見周公也明盛時夢見周公欲行其道也子曰志於道志慕也道不可體故志之而巳矣也據於徳據杖也徳有成形故可據也依於仁依倚也仁者功施於人故可倚之也遊於藝藝六藝也不足據依故曰逰也子曰自行束脩以上吾未甞無誨焉孔安國曰言人能奉禮自行束脩以上則皆教誨之也子曰不憤不啓不悱不發舉一隅而示之不以三隅反則吾不復鄭玄曰孔子與人言必待其人心憤憤口悱悱乃後啓發爲之說也如此則識思之深也說則舉一隅以語之其人不思其類則不復重教之也子食於有喪者之側未甞飽也子於是日也哭則不歌喪者哀戚飽食於其側是無惻隱之心之也子謂顔淵曰用之則行舎之則蔵唯我與爾有是夫孔安國曰言可行則行可止則止唯我與顔淵同耳也子路曰子行三軍則誰與孔安國曰大國三軍子路見孔子獨羙顔淵以為巳有勇至於夫子爲三軍將亦當唯有與巳俱故發此問也子曰暴虎慿河死而無悔者吾不與也孔安國曰暴虎徒搏也慿河徒涉也必也臨事而懼好謀而成者也子曰冨而可求也雖執鞭之士吾亦爲之鄭玄曰冨貴不可求而得者也當脩徳以得之矣若扵道可求者雖執鞭賤軄我亦爲之矣如不可求者從吾所好孔安國曰所好者古人之道也子之所慎齊戰􅍚孔安國曰此三者人所不能慎而夫子能慎之也子在齊聞韶樂三月不知肉味周生烈曰孔子在齊聞習韶樂之盛羙故忘於肉味也曰不圖爲樂之至於斯也王肅曰爲作也不圖作韶樂至於此此齊也冉有曰夫子爲衛君乎孔安國曰爲猶助也衛君者謂輙也衛靈公逐太子蒯聵公薨而立孫輒也後晉趙鞅納蒯聵于戚衛石曼姑帥師圍之故問其意助輒否乎子貢曰諾吾將問之入曰伯夷叔齊何人也子曰古之賢人也曰怨乎曰求仁而得仁又何怨乎孔安國曰夷齊讓國逺去終於餓死故問怨乎以讓為仁豈怨乎出曰夫子不為也鄭玄曰文子爭國悪行也孔子以伯夷叔齊為賢且仁故知不助衛君明也子曰飯𬞞食飲水曲肱而枕之樂亦在其中矣孔安國曰蔬食菜食也肱臂也孔子以此為樂也不義而冨且貴於我如浮雲鄭玄曰冨貴而不以義者於我如浮雲非巳之有也子曰加我數年五十以學易可以無大過矣昜窮理盡性以至於命年五十而知天命以知天命之年讀至命之書故可以無大過也子所雅言孔安國曰雅言正言也詩書執禮皆雅言也鄭玄曰讀先王典法必正言其音然後義全故不可有所諱也禮不誦故言執也葉公問孔子於子路子路不對孔安國曰葉公名諸梁楚大史也食采於葉僣稱公不對者未知所以荅也子曰女奚不曰其為人也發憤忘食樂以忘憂不知老之將至也云爾子曰我非生而知之者好古敏而求之者也鄭玄曰言此者勉人於學也子不語恠力亂神孔安國曰恠性異也力謂若奡盪舟烏獲舉千鈞之属也乱謂臣弑君子弑父也神謂鬼神之事也或無益於教化也或所不忍言也子曰我三人行必得我師焉擇其善者而従之其不善者而改之言我三人行本無賢愚擇善從之不善改之故無常師也子曰天生徳於予桓魋其如予何苞氏曰桓魋宋司馬黎也天生徳於予者謂授以聖性也合徳天地吉無不利故曰其如予何也子曰二三子以我為隱子乎吾無隱乎爾苞氏曰二三子謂諸弟子也聖人知廣道深弟子學之不能及以為有所隱匿故解之也吾無所行而不與二三子者是丘也苞氏曰我所為無不與爾共之者是丘之心也子以四教文行忠信四者有形質可舉以教也子曰聖人吾不得而見之矣得見君子者斯可矣疾丗無明君也子曰善人吾不得而見之矣得見有恒者斯可矣亡而爲有虚而爲盈約而爲㤗難乎有恒矣孔安國曰難可名之爲有常也子釣而不綱弋不射宿孔安國曰釣者一竿釣也綱者爲大綱以撗絶流以缴繋釣羅属著綱也弋繳射也宿宿鳥也子曰盖有不知而作之者我無是也苞氏曰時人多有穿鑿妄作篇籍者故云然也多聞擇其善者而從之多見而識之知次也孔安國曰如此次於知之者也互鄉難與言童子見門人惑鄭玄曰互鄉鄉名也其卿人言語自專不達時冝而有童子來見孔子門人恠孔子見也子曰與其進也不與其退也唯何甚孔安國曰教誨之道與其進不與其退怪我見此童子悪悪何一甚也人㓗已以進與其㓗也不保其徃也鄭玄曰徃猶去也人虚巳自㓗而来當與其進之亦何能保其去㣪之行也子曰仁逺乎哉我欲仁斯仁至矣苞氏曰仁道不逺行之則是至也陳司敗問昭公知禮乎孔安國曰司敗官名也陳大夫也昭公鲁昭公也孔子對曰知禮孔子退揖巫馬期而進之曰吾聞君子不黨君娶於吴爲同姓謂之呉孟子君而知禮孰不知禮孔安國曰巫馬期弟子也名施相助匿非曰黨鲁吳俱姫姓也禮同姓不㛰而君娶之當稱吳姬諱曰孟子也巫馬期以告子曰丘也幸苟有過人必知之孔安國曰以司敗言告也諱國悪禮也聖人智深道弘故受以為過也子與人歌而善必使反之而後和之樂其善故使重歌而後自和之也子曰文莫吾猶人也莫無也文無者猶俗言文不也文不吾猶人者言凢文皆不勝於人也躬行君子則吾未之有得也孔安國曰躬為君子巳未能得之也子曰若聖與仁則吾豈敢孔安國曰孔子謙不敢自名仁聖也抑爲之不厭誨人不倦則可謂云爾巳矣公西華曰正唯弟子不能學也苞氏曰正如所言弟子猶不能學也况仁聖乎也子疾病子路請禱苞氏曰禱禱請於鬼神也子曰有諸周生烈曰言有此禱請於鬼神之事乎也子路對曰有之誄曰禱爾于上下神祗孔安國曰子路失指也誄禱篇名也子曰丘之禱之乆矣孔安國曰孔子素行合於神明故曰丘之禱之乆矣子曰奢則不遜儉則固與其不遜也寧固孔安國曰俱失之也奢不如儉奢則僣上儉則不及禮耳固陋也子曰君子坦蕩蕩小人長戚戚鄭玄曰坦蕩蕩寛廣貌也長戚戚多憂懼貌也子温而厲威而不猛恭而安論語㤗伯第八何晏集解凢卄一章子曰㤗伯其可謂至徳也巳矣三以天下讓民無得而稱焉王肅曰㤗伯周太王之太子也次仲雍少弟曰季歴季歴賢又生聖子文王昌昌必有天下故㤗伯以天下三讓於王季其讓隱故無得而稱言之者所以為至徳也子曰恭而無禮則勞慎而無禮則葸葸畏懼之貌也言慎而不以禮節之則常畏懼也勇而無禮則亂直而無禮則絞馬融曰絞絞刺也君子篤於親則民興於仁故舊不遺則民不偷苞氏曰興起也君能厚於親属不遺忘其故舊行之羙者也則民皆化之起為仁厚之行不偷薄也曽子有疾召門弟子曰啓予足啓予手鄭玄曰啓開也曽子以爲受身躰於父母不敢毁傷之故使弟子開衾而視之也詩云戰戰兢兢如臨深淵如履薄氷孔安國曰言此詩者喻巳常誡慎恐有所毁傷也而今而後吾知免夫小子周生烈曰乃今日而後我自知免於患難矣小子弟子也呼者欲使聼識其言也曽子有疾孟敬子問之馬融曰孟敬子魯大夫仲孫也曽子言曰鳥之將死其鳴也哀人之將死其言也善苞氏曰欲戒敬子言我將且死言善可用也君子所貴道者三動容貌斯逺暴慢矣正顔色斯近信矣出辭氣斯逺鄙倍矣鄭玄曰此道謂禮也動容貌能濟濟蹌蹌則人不敢暴慢之也正顔色能矝荘嚴栗則人不敢欺誕之也出辭氣能順而說則無悪戾之言入於耳也籩豆之事則有司存苞氏曰敬子忘大務小故又戒之以此也籩豆禮器也曽子曰以能問於不能以多問於寡有若無實若虚犯而不校苞氏曰校報也言見侵犯而不報之也昔者吾友甞從事於斯矣馬融曰友謂顔淵也曽子曰可以託六尺之孤孔安國曰六尺之孤謂㓜少之君也可以寄百里之命孔安國曰攝君之政令也臨大節而不可奪也大節安國家定社稷也奪者不可傾奪之也君子人與君子人也曽子曰士不可以不弘毅任重而道逺苞氏曰弘大也毅強而能決断也士弘毅然後能負重任致逺路也仁以為巳任不亦重乎死而後巳不亦逺乎孔安國曰以仁為巳任重莫重焉死而後巳逺莫逺焉也子曰興於詩苞氏曰興起也言修身當先學詩也立於禮苞氏曰禮者所以立身也成於樂孔安國曰樂所以成性也子曰民可使由之不可使知之由用也可使用而不可使知者百姓能日用而不能知也子曰好勇􅍚貧亂也苞氏曰好勇之人而患疾巳之貧賤者必將爲亂也人而不仁疾之巳甚亂也孔安國曰疾悪太甚亦使其爲乱也子曰如有周公之才之羙使驕且悋其餘不足觀也巳矣孔安國曰周公者周公且也子曰三年學不至於糓不易得也巳孔安國曰糓善也言人三歳學不至於善不可得言必無及也所以勸人於學也子曰篤信好學守死善道危邦不入乱邦不居天下有道則見無道則隱苞氏曰言行當常然也危邦不入謂始欲徃也乱邦不居今欲去也臣弑君子弑父乱也危者将乱之兆也邦有道貧且賤焉耻也邦無道冨且貴焉耻也子曰不在其位不謀其政也孔安國曰欲各專一於其軄也子曰師摯之始關雎之乱洋洋乎盈耳哉鄭玄曰師摯鲁大師之名始猶首也周道旣衰鄭衛之音作正樂廢而失節鲁大師摯識關雎之聲而首理其乱洋洋乎盈耳哉聼而羙也子曰狂而不直孔安國曰狂者進取冝直也侗而不愿孔安國曰侗未成器之人也冝謹愿也悾悾而不信苞氏曰悾悾慤慤也冝可信也吾不知之矣孔安國曰言皆與常度反故我不知也子曰學如不及猶恐失之學自外入至熟乃可長久如不及猶恐失之耳也子曰巍巍乎舜禹之有天下也而不與焉羙舜禹巳不與求天下而得之也巍巍者髙大之稱也子曰大哉堯之為君也巍巍乎唯天為大唯堯則之孔安國曰則法也美堯能法天而行化也蕩蕩乎民無能名焉苞氏曰蕩蕩廣逺之稱也言其布徳廣逺民無能識名焉巍巍乎其有成㓛也㓛成化隆髙大巍巍也煥乎其有文章煥明也其立文垂制復著明也舜有臣五人而天下治孔安國曰禹稷契皐陶伯益也武王曰予有乱臣十人孔安國曰乱理也理官者十人也謂周公且召公奭太公望畢公榮公太顛閎夭散冝生南官适也其餘一人謂文母也孔子曰才難不其然乎唐虞之際於斯為盛有婦人焉九人而巳孔安國曰唐者堯號也虞者舜号也際者堯舜交㑹之間也斯此也此於周也言堯舜交㑹之間比於此周周最盛多賢然尚有一婦人其餘九人而巳大才難得豈不然乎三分天下有其二以服事殷周徳其可謂至徳也巳矣苞氏曰殷纣淫乱文王為西伯而有聖徳天下之歸周者三分有二而猶以服事殷故謂之至德也子曰禹吾無間然矣孔安國曰孔子推禹功徳之盛言巳不能復間廁其間也菲飲食而致孝乎鬼神馬融曰菲薄也致孝乎鬼神祭祀豐㓗也悪衣服而致羙乎黻冕孔安國曰損其常服以盛祭服也卑宫室而盡力乎溝洫苞氏曰方里為井井間有溝溝廣深四尺十里為城城間有洫洫廣深八尺也禹吾無間然矣論語卷第四經一千五百十四字注二千三百七十七字
