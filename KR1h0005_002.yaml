body:
  text: 論語八佾第三何晏集解凢卄六章孔子謂季氏八佾舞於庭是可忍也孰不可忍也馬融曰孰誰也佾列也天子八佾諸侯六卿大夫四士二八人為列八八六十四人也魯以周公故受王者礼樂有八佾之舞今季桓子僣於其家廟儛之故孔子譏之也三家者以雍徹馬融曰三家者謂仲孫叔孫季孫也雍周頌臣工篇名也天子祭於宗廟歌之以徹祭今三家亦作此樂者也子曰相維辟公天子穆穆奚取於三家之堂苞氏曰辟公謂諸侯及二王之後也穆穆天子之容也雍篇歌此者有諸侯及二王之後来助祭故也今三家伹家臣而巳何取此義而作之於堂邪也子曰人而不仁如禮何人而不仁如樂何苞氏曰言人而不仁必不能行禮樂也林放問禮之本鄭玄曰林放鲁人也子曰大哉問禮與其奢也寧儉喪與其易也寧戚苞氏曰易和易也言禮之本意失於奢不如儉也喪失於和易不如衷戚也子曰夷狄之有君不如諸夏之亡也苞氏曰諸夏中國也亡無也季氏旅於㤗山子謂冉有曰汝不能救與馬融曰旅祭名也禮諸侯祭山川在其封内者今陪臣祭㤗山非禮也冉有弟子冉求也時仕於季氏救猶止也對曰不能子曰嗚呼曽謂㤗山不如林放乎苞氏曰神不享非禮林放尚知禮㤗山之神反不如林放邪欲誣而祭之子曰君子無所爭必也射乎孔安國曰言於射而後有爭也揖讓而升下而飲王肅曰射於堂升及下皆揖讓而相飲也其爭也君子馬融曰多筭飲少筭君子之所爭也子夏問曰巧笑倩兮羙目盻兮素以爲絢兮何謂也馬融曰倩笑㒵盻動目㒵也珣文㒵也此上二句在衛風碩人二章其下一句逸也子曰繪事㣪素鄭玄曰繪畫文也九畫繪先布衆色然後以素分其間以成其文喻美女雖有倩盻羙質亦湏禮以成之也曰禮㣪乎孔安國曰孔子言繪事後素子夏聞而解知以素喻礼故曰礼後乎子曰起予者商也始可與言詩巳矣苞氏曰予我也孔子言子夏能發明我意可與共言詩巳矣子曰夏禮吾能言之杞不足徴殷禮吾能言之宋不足徴也苞氏曰徵成也杞宋二國名也夏殷之後也夏殷之礼吾能說之杞宋之君不足以成之也文獻不足故也足則吾能徴之矣鄭玄曰獻猶賢也我能不以其礼成之者以此二國之君文章賢才不足故也子曰禘自既灌而徃者吾不欲觀之矣孔安國曰禘祫之礼為序昭穆也故毀廟之主及群廟之主皆合食於太祖灌者酌鬰鬯灌於太祖以降神也既灌之後别尊卑序昭穆而鲁逆祀躋僖公亂昭穆故不欲觀之矣或問禘之說子曰不知也孔安國曰荅以不知者為魯君諱也知其說者之於天下也其如示諸斯乎指其掌苞氏曰孔子謂或人言知禘禮之説者於天下之事如指示以掌中之物言其易了也祭如在孔安國曰言事死如事生也祭神如神在孔安國曰謂祭百神也子曰吾不與祭如不祭苞氏曰孔子或岀或病而不自親祭使攝者爲之不致敬於心與不祭同也王孫賈問曰與其媚於奥寜媚於竈何謂也孔安國曰王孫賈衛大夫也奥内也以喻近臣也竈以喻執政也賈者執政者也欲使孔子求眤之故微以丗俗之言感動之子曰不然獲罪於天無所禱也孔安國曰天以喻君孔子距之曰如獲罪於天無所禱於衆神也子曰周監於二代郁郁乎文哉吾從周孔安國曰監視也言周文章備於二代當從周也子入太廟苞氏曰太廟周公廟也孔子仕魯魯祭周公而助祭也毎事問或曰孰謂鄹人之子知禮乎入太廟毎事問孔安國曰鄹孔子父叔梁紇所治邑也時人多言孔子知礼或人以為知礼者不當𣸪問也子聞之曰是禮也孔安國曰雖知之當復問慎之至也子曰射不主皮馬融曰射有五善焉一曰和志體和也二曰和容有容儀也三曰主皮能中質也四曰和頌合雅頌也五曰興儛與舞同也天子有三侯以熊虎豹皮爲之言射者不伹以中皮爲善亦兼取和容也爲力不同科古之道也馬融曰爲力爲力􅟕之事也亦有上中下設三科焉故曰不同科之也子貢欲去告朔之餼羊鄭玄曰牲生曰餼禮人君毎月告朔於廟有祭謂之朝享也魯自文公始不視朔子貢見其礼廢故欲去其羊也子曰賜也汝愛其羊我愛其禮苞氏曰羊在猶所以識其礼也羊亡礼遂廢也子曰事君盡禮人以爲諂孔安國曰時事君者多無礼故以有礼者爲諂也定公問君使臣臣事君如之何孔安國曰定公鲁君謚也時臣失礼定公患之故問也孔子對曰君使臣以禮臣事君以忠子曰關雎樂而不淫哀而不傷孔安國曰樂而不至淫哀而不至傷言其和也哀公問社於宰我宰我對曰夏后氏以松殷人以栢周人以栗曰使民戰栗也孔安國曰九建邦立社各以其圡所冝之木宰我不本其意妄爲之說因周用栗便云使民戰栗之也子聞之曰成事不說苞氏曰事巳成不可復解說也遂事不諫苞氏曰事巳遂不可復諫止也既徃不咎苞氏曰事巳徃不可復追非咎也孔子非宰我故歴言三者欲使慎其後也子曰管仲之器小哉言其器量小也或曰管仲儉乎苞氏曰或人見孔子小之以爲謂之太儉也曰管氏有三歸官事不攝焉得儉乎苞氏曰三歸娶三姓女也婦人謂嫁為歸攝猶兼也礼國君事大官各有人大夫并兼今管仲家臣備軄非爲儉也曰然則管仲知禮乎苞氏曰或人以儉問故荅以安得儉或人聞不儉更謂爲得礼也曰邦君樹塞門管氏亦樹塞門邦君爲兩君之好有反坫管氏亦有反坫鄭玄曰反玷反爵之玷也在兩楹之間人君有别外内於門樹屏以蔽之也若與鄰國君爲好㑹其獻酢之礼更酌酌畢則各反爵於玷上今管仲皆僭爲之如是是不知礼也管氏而知礼孰不知礼子語魯太師樂曰樂其可知巳也始作翕如也大師樂官名也五音始奏翕如盛也從之純如也從讀曰縱言五音既發放縱盡其聲純純和諧也皦如也言其音節明也繹如也以成縱之以純如皦如繹如言樂始於翕如而成於三也儀封人請見鄭玄曰儀蓋衛邑也封人官名也曰君子之至於斯者吾未甞不得見也從者見之苞氏曰從者弟子随孔子行者也通使得見也出曰二三子何患於喪乎天下之無道乆矣孔安國曰語諸弟子言何患於夫子聖徳之將喪亡邪天下之無道巳乆矣極衰必有盛也天將以夫子爲木鐸孔安國曰木鐸施政教之時所振也言天將命孔子制法度以号令於天下也子謂韶盡羙矣又盡善也孔安國曰韶舜樂也謂以聖徳受禪故曰盡善也謂武盡羙矣未盡善也孔安國曰武武王樂也以征伐取天下故曰未盡善也子曰居上不寛爲禮不敬臨喪不哀吾何以觀之哉論語里仁第四何晏集解凢卄六章子曰里仁爲善鄭玄曰里者民之所居也居於仁者之里是爲善也擇不䖏仁焉得智鄭玄曰求善居而不䖏仁者之里不得爲有智也子曰不仁者不可以久處約孔安國曰久困則爲非也不可以長處樂孔安國曰必驕佚也仁者安仁苞氏曰唯性仁者自然躰之故謂安仁也智者利仁王肅曰知仁爲羙故利行之也子曰唯仁者能好人能悪人孔安國曰唯仁者能審人好悪也子曰苟志於仁矣無悪孔安國曰苟誠也言誠能志於仁者則其餘無悪也子曰冨與貴是人之所欲也不以其道得之不處也孔安國曰不以其道得冨貴不處也貧與賤是人之所悪不以其道得之不去時有否㤗故君子履道而反貧賤此則不以其道而得之者也雖是人之所悪不可違而去也君子去仁悪乎成名孔安國曰悪乎成名者不得成名爲君子也君子無終食之間違仁造次必於是顚沛必於是馬融曰造次急遽也顛沛僵仆也雖急遽僵仆不違於仁也子曰我末見好仁者悪不仁者好仁者無以尚之孔安國曰難復加也悪不仁者其爲仁矣不使不仁者加乎其身孔安國曰言悪不仁者能使不仁者不加非義於巳不如好仁者無以加尚爲之優也有能一日用其力於仁矣乎我未見力不足者也孔安國曰言人無能一日用其力㫦仁者耳我未見欲爲仁而力不足者也蓋有之乎我未之見也孔安國曰謙不欲盡誣時人言不能爲仁故云爲能有耳其我未見也子曰民之過也各於其黨觀過斯知仁矣孔安國曰黨黨類也小人不能爲君子之行非小人之過也當恕而勿責之觀過使賢愚各當其所則爲仁之也子曰朝聞道夕死可矣言將至死不聞丗之有道也子曰士志於道而恥悪衣悪食者未足與議也子曰君子之於天下也無適也無莫也義之與比也言君子於天下無適無莫無所貪慕也唯義之所在也子曰君子懷徳孔安國曰懷安也小人懷圡孔安國曰重遷也君子懷刑孔安國曰安於法也小人懷惠苞氏曰惠恩惠也子曰放於利而行孔安國曰放依也毎事依利而行也多怨孔安國曰取怨之道也子曰能以禮讓爲國乎何有何有者言不難之也不能以禮讓爲國如禮何苞氏曰如礼何者言不能用礼也子曰不患無位患所以立不患莫巳知也求爲可知也苞氏曰求善道而學行之則人知巳也子曰參乎吾道一以貫之哉曽子曰唯孔安國曰直曉不問故荅曰唯也子出門人問曰何謂也曽子曰夫子之道忠恕而巳矣子曰君子喻於義小人喻於利孔安國曰喻猶曉也子曰見賢思齊焉苞氏曰思與賢者䒭也見不賢者而内自省也子曰事父母幾諌苞氏曰幾微也當微諌納善言於父母也見志不從又敬不違勞不怨苞氏曰見志者見父母志有不從巳諫之色則又當恭敬不敢違父母意而遂巳諌也子曰父母在子不逺逰逰必有方鄭玄曰方猶常也子曰三年無改於父之道可謂孝矣鄭玄曰孝子在喪哀慼思慕無改其父之道非心所忍爲也子曰父母之年不可不知也一則以喜一則以懼孔安國曰見其夀考則喜見其衰老則懼之也子曰古者言之不出也恥躬之不逮也苞氏曰古之人言不妄出口者爲恥其身行之將不及也子曰以約失之者鮮矣孔安國曰俱不得中也奢則驕溢則招禍儉約則無憂患也子曰君子欲訥於言而敏於行苞氏曰訥遲鈍也言欲遅鈍而行欲敏也子曰徳不孤必有鄰方以類聚同志相求故必有鄰也是以不孤也子游曰事君數斯辱矣朋友數斯䟽矣數謂速數之數也論語卷第二經一千二百一十二字注一千九百三十一字
