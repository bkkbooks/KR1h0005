body:
  text: 論語子路第十三何晏集解凡卅章子路問政子曰先之勞之孔安國曰先導之以德使民信之然後勞之也易曰恱以使民民忘其勞之也請益曰無倦孔安國曰子路嫌其少故請益曰無倦者行此上事無倦則可也仲弓為季氏宰問政子曰先有司王肅曰言為政當先任有司而後責其事也赦小過舉賢才曰焉知賢才而舉之曰舉爾所知爾所不知人其舍諸孔安國曰汝所不知者人將自舉之各舉其所知則賢才無遺也子路曰衛君待子而為政子將奚先苞氏曰問往將何所先行也子曰必也正名乎馬融曰正正百事之名也子路曰有是哉子之迃也奚其正名苞氏曰迃揂逺也言孔子之言逺於事也子曰野哉由也孔安國曰野猶不達也君子於其所不知蓋闕如也苞氏曰君子於其所不知當闕而勿據今由不知正名之義而謂之迂逺也名不正則言不順言不順則事不成事不成則禮樂不興禮樂不興則刑罰不中孔安國曰禮以安上樂以移風二者不行則有淫刑濫罰也刑罰不中則民無所措手足故君子名之必可言也言之必可行也王肅曰所名之事必可得而明言也所言之事必可得而遵行也君子於其言無所苟而巳矣樊遲請學稼子曰吾不如老農請學為圃子曰吾不如老圃馬融曰樹五穀曰稼樹䒹𬞞曰圃也樊遲出子曰小人哉樊須也上好禮則民莫敢不敬上好義則民莫敢不服上好信則民莫敢不用情孔安國曰情情實也言民化其上各以情實應也夫如是則四方之民襁負其子而至矣焉用稼苞氏曰禮義與信足以成德何用學稼教民乎負者以器曰襁也子曰誦詩三百授之以政不達使於四方不能専對雖多亦奚以為哉専猶獨也子曰其身正不令而行其身不正雖令不從令教令也子曰魯衛之政兄弟也苞氏曰魯周公之封衛康叔之封也周公康叔既為兄弟康叔睦於周公其國之政亦如兄弟也子謂衛公子荆善居室王肅曰荆與蘧瑗史鰌並為君子也始有曰苟合矣少有曰苟完矣冨有曰苟美矣子適衛冉有僕孔安國曰孔子之衛冉有御也子曰庶矣哉孔安國曰庶衆也言衛民衆多也冉有曰既庶矣又何加焉曰冨之曰既冨矣又何加焉曰教之子曰苟有用我者期月而巳可也三年有成孔安國曰言誠有用我於政事者期月而可以行其政教必三年乃有成功也子曰善人為邦百年亦可以勝殘去殺矣王肅曰勝殘勝殘暴之人使不為惡也去殺不用刑殺也誠哉是言也孔安國曰古有此言故孔子信也子曰如有王者必丗而後仁孔安國曰三十年曰丗如有受命王者必三十年仁政乃成也子曰苟正其身矣於從政乎何有不能正其身如正人何冉子退朝周生烈曰謂罷朝於魯君也子曰何晏也對曰有政馬融曰改者有所改更匡正也子曰其事也馬融曰事者凡所行常事也如有政雖不吾以吾其與聞之馬融曰如有政非常之事我為大夫雖不見任用必當與聞之定公問一言而可以興邦有諸孔子對曰言不可以若是其幾也王肅曰以其大要一言不能正興國也幾近也有近一言可興國也人之言曰為君難為臣不易如知為君之難也不幾乎一言而興邦乎孔安國曰事不可一言而成也知如此則可近也曰一言而可喪邦有諸孔子對曰言不可以若是其幾也人之言曰豫無樂乎為君唯其言而樂莫豫違也孔安國曰言無樂於為君所樂者唯樂其言而不見違也如其善而莫之違也不亦善乎如不善而莫之違也不幾乎一言而喪邦乎孔安國曰人君所言善無違之者則善也其所言不善而無敢違之者則近一言而喪國也業公問政子曰近者恱逺者來子夏為莒父宰問政鄭玄曰舊説曰莒文魯下邑也子曰毋欲速毋見小利欲速則不達見小利則大事不成孔安國曰事不可以速成而欲其速則不達矣見小利妨大事則大事不成也葉公語孔子曰吾黨有直躬者孔安國曰直躬直身而行也其父攘羊而子證之周生烈曰有因而盜曰攘孔子曰吾黨之直者異於是父為子隱子為父隱直在其中矣樊遲問仁子曰居處恭執事敬與人忠雖之夷狄不可棄也苞氏曰雖之夷狄無禮義之處猶不可棄去而不行也子貢問曰何如斯可謂之士矣子曰行巳有恥孔安國曰有恥有所不為也使於四方不辱君命可謂士矣曰敢問其次曰宗族稱孝焉鄉黨稱悌焉曰敢問其次曰言必信行必果硜硜然小人也抑亦可以為次矣鄭玄曰行必果所欲行必敢為之硜硜者小人之貌也抑亦其次言可以為次也曰今之從政者何如子曰噫斗筲之人何足算也鄭玄曰噫心不平之聲也筲竹器容斗二升者也算數也子曰不得中行而與之必也狂狷乎苞氏曰中行行能得其中者也言不得中行則欲得狂狷也狂者進取狷者有所不為也苞氏曰狂者進取於善道狷者守節無為欲得此二人者以時多進退取其恆一也子曰南人有言曰人而無恆不可以作巫醫孔安國曰南人南國之人也鄭玄曰言巫醫不能治無常之人也善夫苞氏曰善南人之言也不恆其德或承之羞孔安國曰此易恆卦之辭也言德無常則羞厚承之子曰不占而巳矣鄭玄曰易所以占吉凶也無恆之人易所不占也子曰君子和而不同小人同而不和君子心和然其所見各異故曰不同小人所嗜好者同然各爭其利故曰不和也子貢問曰鄉人皆好之何如子曰未可也鄉人皆惡之何如子曰未可也不如鄉人之善者好之其不善者惡之也孔安國曰善人善巳惡人惡巳是善善明惡惡著也子曰君子易事而難恱也孔安國曰不責備於一人故易事也恱之不以道不恱也及其使人也器也孔安國曰度才而任官也小人難事而易悗也悗之雖不以道恱也及其使人也求備焉子曰君子泰而不驕小人驕而不泰君子自縱泰似驕而不驕小人拘忌而實自驕矜也子曰剛毅木訥近仁王肅曰剛無欲也毅果敢也木質朴也訥遲鈍也有此四者近于仁也子路問曰何如斯可謂之士矣子曰切切偲偲怡怡如也可謂士矣朋友切切偲偲兄弟怡怡如也馬融曰切切偲偲相切責之貌也怡怡和順之貌也子曰善人教民七年亦可以即戎矣苞氏曰即戎就兵可以攻戰也子曰以不教民戰是謂棄之馬融曰言用不習民使之戰必破敗是謂棄之也論語憲問第十四何晏集解九卅四章憲問恥子曰邦有道穀孔安國曰穀祿也邦有道當食其祿也邦無道穀恥也孔安國曰君無道而在其朝食其祿是恥辱也剋伐怨欲不行焉可以為仁矣馬融曰剋好勝人也伐自伐其功也怨忌小怨也欲貪欲也子曰可以為難矣仁則吾不知也苞氏曰此四者行之難者未是以為仁也子曰士而懷居不足以為士矣士當志道不求安而懷其居非士也子曰邦有道危言危行苞氏曰危厲也邦有道可以厲言行也邦無道危行言遜遜順也厲行不隨俗順言以逺害也子曰有德者必有言德不可以憶中故必有言也有言者不必有德仁者必有勇勇者不必有仁南宫適孔安國曰適南宫敬叔魯大夫也問於孔子曰羿善射奡蕩舟孔安國曰羿有窮之君也篡夏后相之位其臣寒浞殺之因其室而生奡奡多力能陸地行舟為夏后少康所殺也俱不得其死然孔安國曰此二子者皆不得以壽終也禹稷躬稼而有天下夫子不答馬融曰禹盡力於溝洫稷播殖百穀故曰躬稼也禹及其身稷及後丗皆王也適意欲以禹稷比孔子孔子謙故不答也南宫適出子曰君子哉若人尚德哉若人孔安國曰賤不義而貴有德故曰君子也子曰君子而不仁者有矣夫未有小人而仁者也孔安國曰雖日君子猶未能備也子曰愛之能勿勞乎忠焉能勿誨乎孔安國曰言人有所愛必欲勞來之有所忠必欲教誨之也子曰為命卑諶草創之孔安國曰卑諶鄭大夫名也謀於野則獲謀於國則否鄭國將有諸侯之事則使乘車以適野而謀作盟會之辭也丗叔討論之行人子羽修飾東里子産潤色之馬融曰丗叔鄭大夫遊吉也討治也卑諶既造謀丗叔𣸪治而論之詳而審之也行人掌使之官也子羽公孫揮也子産居東里因以為號也更此四賢而成故鮮有敗事也或問子産子曰惠人也孔安國曰惠愛也子産古之遺愛也問子西曰彼哉彼哉馬融曰子西鄭大夫彼哉彼哉言無足稱也或曰楚令尹子西也問管仲曰人也猶詩言所謂伊人也奪伯氏駢邑三百飯𬞞食沒齒無怨言孔安國曰伯氏齊大夫駢邑地名也齒年也伯氏食邑三百家管仲奪之使至𬞞食而沒齒無怨言以當其理故也子曰貧而無怨難冨而無驕易子曰孟公綽為趙魏老則優不可以為藤薛大夫也孔安國曰公綽魯大夫也趙魏皆晉卿也家臣稱老公綽性寡欲趙魏貪賢家老無職故優藤薛小國大夫職煩故不可為也子路問成人曰若臧武仲之智馬融曰魯大夫臧孫紇也公綽之不欲馬融曰魯大夫孟公綽也卞莊子之勇周生烈曰卞邑大夫也冉求之藝文之以禮樂孔安國曰加之以禮樂文成也亦可以為成人矣曰今之成人者何必然見利思義馬融曰義然後取不苟得也見危授命久要不忘平生之言亦可以為成人矣孔安國曰久要舊約也平生猶少時也子問公叔文子於公明賈曰信乎夫子不言不笑不取乎孔安國曰公叔文子衛大夫公孫拔也文諡也公明賈對曰以告者過也夫子時然後言人不厭其言也樂然後笑人不厭其笑也義然後取人不厭其取也子曰其然豈其然乎馬融曰美其得道嫌其不能悉然也子曰臧武仲以防求為後於魯雖曰不要君吾不信也孔安國曰防武仲故邑也為後立後也魯襄公三十三年武仲為孟氏所譛出奔邾自邾如防使以大蔡納請曰統非敢害也智不足也非敢私請苟守先祀無廢二勳敢不避邑乃立臧為紇致防而奔齊此所謂要君也子曰晉文公譎而不正鄭玄曰譎者詐也謂召于天子而使諸侯朝之仲尼曰以臣召君不可以訓故書曰天王狩于河陽是譎而不正也齊桓公正而不譎馬融曰伐楚以公義責苞苐之貢不入問昭王南征不還是正而不譎也子路曰桓公殺公子紏召忽死之管仲不死曰未仁乎孔安國曰齊襄公立無常鮑叔牙曰君使民慢亂將作矣奉公子小白出奔苡襄公從弟公孫無知殺襄公管夷吾召忽奉公子紏出奔魯齊人殺無知魯伐齊納子紏小自自莒先入是為桓公乃殺子糾召忽死也子曰桓公九合諸侯不以兵車管仲之力也如其仁如其仁孔安國曰誰如管仲之仁矣子貢曰管仲非仁者與桓公殺公子紏不能死又相之子曰管仲相桓公霸諸侯一匡天下馬融曰匡正也天子微弱桓公率諸侯以尊周室一正天下也民到于今受其賜受其賜者謂不𬒳髮左袵之惠也微管仲吾其𬒳髮左袵矣馬融曰微無也無管仲則君不君臣不臣皆為夷狄也豈若匹夫匹婦之為諒也自經於溝瀆而莫之知也王肅曰經經死於溝瀆之中也管仲召忽之於公子紏君臣之義未正成故死之未足深嘉不死未足多非死既難亦在於過厚故仲尼伹美管仲之功亦不言召忽不當死也公叔文子之臣大夫僎與文子同升諸公孔安國曰大夫僎本文子家臣也薦之使與巳並為大夫同升在公朝也子聞之曰可以為文矣孔安國曰行如是可諡為文也子曰衛靈公之無道也康子曰夫如是奚而不喪孔子曰仲叔圉治賔客祝鮀治宗廟王孫賈治軍旅夫如是奚其喪孔安國曰言君雖無道所任者各當其才何為當亡乎也子曰其言之不怍則其為之難也馬融曰作慙也內有其實則言之不慙積其實者為之難也陳成子殺簡公孔子沐浴而朝告於哀公曰陳桓殺其君請討之馬融曰陳成子齊大夫陳桓也將告君故先齊齋必沐浴也公曰告夫二三子孔安國曰謂三卿也孔子曰以吾從大夫之後不敢不告也君曰告夫二三子者馬融曰我於禮當告君不當告二三子君使我往故復往也之二三子告不可孔子曰以吾從大夫之後不敢不告馬融曰孔子由君命之二三子告不可故𣸪以此辭語之而止也子路問事君子曰勿欺也而犯之孔安國曰事君之道義不可欺當能犯顔色諫爭也子曰君子上達小人下達本為上未為下也子曰古之學者為巳今之學者為人也孔安國曰為巳履而行之無為人徒能言之也蘧伯玉使人于孔子孔子與人坐而問焉孔安國曰伯玉衛大夫蘧瑗也曰夫子何為對曰夫子欲寡其過而未能也言夫子欲寡其過而未能無過也使者出子曰使乎使乎陳群曰再言使乎善之也言使得其人也子曰不在其位不謀其政曽子曰君子思不出其位子曰君子恥其言之過其行也子曰君子道者三我無能焉仁者不憂知者不惑勇者不懼子貢曰夫子自道也子貢方人孔安國曰比方人也子曰賜也賢乎我夫我則不睱孔安國曰不睱比方人也子曰不患人之不已知患巳無能也王肅曰徒患巳之無能也子曰不逆詐不憶不信抑亦先覺者是賢乎孔安國曰先覺人情者是寧能為賢乎或時反怨人也微生畒謂孔子曰丘何為是栖栖者與無乃為佞乎苞氏曰微生姓也畒名也孔子對曰非敢為佞也􅍚固也苞氏曰疾丗固陋欲行道以化人也子曰驥不稱其力稱其德也鄭玄曰德者謂調良之德也或曰以德報怨何如子曰何以報德德恩惠之德也以直報怨以德報德子曰莫我知也夫子貢曰何為其莫知子也子貢恎夫子言何為莫知巳故問也子曰不怨天不尤人馬融曰孔子不用於丗而不怨天人不知巳亦不尤人也下學而上達孔安國曰下學人事上知天命也知我者其天乎聖人與天地合其德故曰唯天知巳也公伯寮訴子路於季孫馬融曰訴譖也伯寮魯人弟子也子服景伯以告馬融曰魯大夫子服何忌也告告孔子也曰夫子固有惑志孔安國曰季孫信讒惑子路也於公伯寮也吾力猶能肆諸市朝鄭玄曰吾勢能辨子路之無罪於季孫使之誅伯寮而肆之也有罪既刑陳其尸曰肆也子曰道之將行也與命也道之將廢也與命也公伯寮其如命何子曰賢者避丗孔安國曰丗主莫得而臣之也其次避地馬融曰去亂國適治邦也其次避色孔安國曰色斯舉也其次避言孔安國曰有惡言乃去也子曰作者七人矣苞氏曰作為也為之者凡七人謂長沮桀溺丈人石門荷簣儀封人楚狂接與也子路宿於石門石門晨門曰奚自晨門者閽人也子路曰自孔氏曰是知其不可而為之者與苞氏曰言孔子知丗不可為而強為之也子擊磬於衛有荷簣而過孔子之門者曰有心哉擊磬乎簣草器也有心謂契契然也既而曰鄙哉硜硜乎莫巳知也斯巳而巳矣此硜硜徒信巳而巳言亦無益也深則厲淺則揭苞氏曰以衣涉水為厲揭揭衣言隨丗以行巳若遇水必以濟知其不可則當不為也子曰果哉未之難矣未知巳志而便譏巳所以為果也未無也無以難者以其不能解巳道也子張曰書云髙宗諒隂三年不言何謂也孔安國曰髙宗殷之中興王武丁也諒信也隂猶默也子曰何必髙宗古之人皆然君薨百官總已馬融曰已已百官也以聽於冢宰三年孔安國曰冢宰天官佐王治者也三年喪畢然後王自聽政也子曰上好禮則民易使也民莫敢不敬故易使之也子路問君子子曰修巳以敬人孔安國曰敬其身也曰如斯而巳乎曰修巳以安人孔安國曰人謂朋友九族也曰如斯而已乎曰修巴以安百姓修巳以安百姓堯舜其猶病諸孔安國曰病猶難也原壤夷俟馬融曰原壤魯人孔子故舊也夷踞也俟待也踞待孔子也子曰幼而不遜悌長而無述焉老而不死是為賊賊為賊害也以杖叩其脛孔安國曰叩擊也脛腳脛也闕黨童子將命矣馬融曰闕黨之童子將命者傳賔主之語出入之也或問之曰益者與子曰吾見其踞於位也童子隅坐無位成人乃有位也見其與先生並行也非求益者也欲速成者也苞氏曰先生成人也並行不差在後也違禮欲速成者也則非求益者也論語卷第七經二千三百九十四字注二千五百五十六字
