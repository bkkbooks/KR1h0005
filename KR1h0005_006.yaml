body:
  text: 論語先進第十一何晏集解凡二十三章子曰先進於禮樂野人也後進於禮樂君子也先進後進謂士先後輩也禮樂因丗損益後進與禮樂俱得時之中斯君子矣先進有古風斯野人也如用之則吾從先進苞氏曰將移風易俗歸之純素先進猶近古風故從之也子曰從我於陳蔡者皆不及門者也鄭玄曰言弟子之從我而厄於陳蔡者皆不及仕進之門而失其所也子曰德行顔淵閔子騫冉伯牛仲弓言語宰我子貢政事冉有季路文學子遊子夏子曰回也非助我者也於吾言無所不説孔安國曰助猶益也言回聞言即解無可發起增益好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也顔淵死顔路請子之車孔安國曰顔路顔淵之父也家貧故欲請孔子之車賣以作柳子曰才不才亦各言其子也鯉死有棺而無槨吾不可徒行以為之槨以吾從大夫之後吾以不可徒行也孔安國曰鯉孔子之子伯魚孔子時為大夫故言吾從大夫之後不可以徒行是謙辭也顔淵死子曰噫苞氏曰噫痛傷之聲天喪豫天喪豫天喪豫者若喪巳也再言之者痛惜之甚也顔淵死子哭之慟馬融曰慟哀過也從者曰子慟矣子曰有慟乎孔安國曰不自知巳之悲哀之遣也非夫人之為慟而誰為慟顔淵死門人欲厚葬之子曰不可禮貧冨各有冝顔淵家貧而門人欲厚葬之故不聽也門人厚葬之子曰回也視豫猶父也豫不得視猶子也非我也夫二三子也馬融曰言回自有父父意欲聽門人厚葬之我不得制止非其厚葬故云爾也季路問事鬼神子曰未能事人焉能事鬼曰敢問事死曰未知生焉知死陳群曰鬼神及死事難明語之無益故不答也閔子騫侍側誾誾如也子路行行如也冉子子貢侃侃如也子樂鄭玄曰樂各盡其性也行行剛強之貌也若由也不得其死然孔安國曰不得以夀終也魯人為長府閔子騫曰仍舊貫如之何何必改作鄭玄曰長府藏名也藏貨曰府仍因也貫事也因舊事則可何乃復更改作也子曰夫人不言言必有中王肅曰言必有中善其不欲勞民改作之也子曰由之鼓瑟奚為於丘之門馬融曰言子路鼓瑟不合雅頌也門人不敬子路子曰由也升堂矣未入於室也馬融曰升我堂矣未入室耳門人不解謂孔子言為賤子路故復解之也子貢問師與啇也孰賢乎子曰師也過啇也不及孔安國曰言俱不得中也曰然則師愈與子曰過猶不及也愈猶勝也季氏富於周公孔安國曰周公天子之宰卿士也而求也為之聚斂而附益之孔安國曰冉求為季氏宰為之急賦稅也子曰非吾徒也小子鳴鼓而攻之可也鄭玄曰小子門人也鳴鼓聲其罪以責之柴也愚弟子髙柴也字子羔愚愚直之愚也參也魯孔安國曰魯鈍也曽子遲鈍也師僻也馬融曰子張才過人失在邪僻文過也由唁也鄭玄曰子路之行失於吸唁也子曰回也其庶乎屢空賜不受命而貨殖焉憶則屢中言回庶幾聖道雖數空匱而樂在其中矣賜不受教命唯財貨是殖億度是非蓋美回所以勵賜也一曰屢猶每也空猶虛中也以聖人之善教數子之庶幾猶不至於知道者各內有此害也其於庶幾每能虛中者唯回懷道深逺不虛心不能知道子貢無數子病然亦不知道者雖不窮理而幸中雖非天命而偶冨亦所以不虛心也子張問善人之道子曰不踐迹亦不入於室孔安國曰踐循也言善人不循追舊迹而巳亦多少能創業然亦不能入於聖人之奧室也子曰論篤是與君子者乎色莊者乎論篤者謂口無擇言也君子者謂身無鄙行也色莊者不惡而嚴以遠小人者也言此三者皆可以為善人者也子路問聞斯行諸苞氏曰賑窮救之之事也子曰有父兄在如之何其聞斯行之也孔安國曰當白父兄不可得自專也冉有問聞斯行諸子曰聞斯行之公西華曰由也問聞斯行諸子曰有父兄在求也問聞斯行諸子曰聞斯行之赤也惑敢問孔安國曰惑其問同而答異也子曰求也退故進之由也兼人故退之鄭玄曰言冉有性謙退子路務在勝尚人各因其人之失而正也子畏於匡顔淵後孔安國曰言與孔子相失故在後也子曰吾以汝為死矣曰子在回何敢死苞氏曰言夫子在巳無所敢死也季子然問仲由冉求可謂大臣與孔安國曰季子然季氏之子弟自多得臣此二子故問之子曰吾以子為異之問曽由與求之問孔安國曰謂子問異事耳則此二人之問安足為大臣乎所謂大臣者以道事君不可則止今由與求也可謂具臣矣孔安國曰言備臣數而巳也曰然則從之者與孔安國曰問為臣皆當從君所欲邪子曰弒父與君亦不從也孔安國曰二子雖從其主亦不與為大逆也子路使子羔為費宰子曰賊夫人之子苞氏曰子羔學未熟習而使為攻所以賊害人也子路曰有民人焉有社稷焉何必讀書然後為學孔安國曰言治民事神於是而習亦學也子曰是故惡夫佞者孔安國曰疾其以口給應遂巳非而不知窮也子路曽晢孔安國曰曽晢曽參父也名點冉有公西華侍坐子曰以吾一日長乎爾無吾以也孔安國曰言我問汝汝無以我長故難對也居則曰不吾知也孔安國曰汝常居云人不知巳如或知爾則何以哉孔安國曰如有用汝有則何以為治乎子路率爾而對率爾先三人對也曰千乘之國攝乎大國間加之以師旅因之以飢饉苞氏曰攝攝迫乎大國之間也由也為之比及三年可使有勇且知方也方義方也夫子哂之馬融曰哂笑也求爾何如對曰方六七十如五六十求性謙退言欲得方六七十如五六十里小國治之而巳也求也為之比及三年可使足民也如其禮樂以俟君子孔安國曰求自云能足民而巳謂衣食足也若禮樂之化當以待君子謙辭也赤爾何如對曰非曰能之也願學焉宗廟之事如會同端章甫願為小相焉鄭玄曰我非自言能也願學為之宗廟之事謂祭祀也諸侯時見曰會殷見曰同端玄端也衣玄端冠章甫諸侯曰視朝之服也小相謂相君之禮者也點爾何如鼓瑟希孔安國曰思所以對故音希也鏗爾舍瑟而作對曰異乎三子者之撰孔安國曰置瑟起對也撰具也為政之具也鏗爾者投瑟之聲也子曰何傷乎亦各言其志也孔安國曰各言巳志於義無傷之曰暮春者春服既成得冠者五六人童子六七人浴乎沂風乎舞􅟔詠而歸苞氏曰暮春者季春三月也春服既成者衣單祫之時也我欲得冠者五六人童子六七人浴於沂水之上風涼於舞􅟔之下歌詠先王之道歸夫子之門也夫子喟然歎曰吾與點也周生烈曰善點之獨知時之三子者出曽晢後曽晢曰夫三子者之言何如子曰亦各言其志也已矣曰夫子何哂由也子曰為國以禮其言不讓是故哂之苞氏曰為國以禮禮貴讓子路言不讓故笑之唯求則非邦也與安見方六七十如五六十而非邦也者唯赤則非邦也與宗廟之事如會同非諸侯如之何孔安國曰明皆諸侯之事與子路同徒笑子路不讓也赤也為之小孰能為之大相孔安國曰赤謙言小相耳孰能為大相者也論語顔淵第十二何晏集解九草四章顔淵問仁子曰尅己𣸪禮為仁馬融曰尅巳約身也孔安國曰復及也身能及禮則為仁矣一日尅己復禮天下歸仁焉馬融曰一日猶見歸况終身乎為仁由巳而由人乎哉孔安國曰行善在巳不在人也顔淵曰請問其目苞氏曰知其必有條目故請問之也子曰非禮勿視非禮勿聽非禮勿言非禮勿動鄭玄曰此四者尅巳復禮之目顔淵曰回雖不敏請事斯語矣王肅曰敬事此語必行之仲弓問仁子曰出門如見大賔使民如承大祭孔安國曰仁之道莫尚乎敬也巳所不欲勿施於人在邦無怨在家無怨苞氏曰在邦為諸侯也在家為卿大夫也仲弓曰雍雖不敏請事斯語矣司馬牛問仁子曰仁者其言也訒也孔安國曰訒難也牛宋人也弟子司馬犂也曰其言也訒斯可謂之仁巳矣乎子曰為之難言之得無訒乎孔安國曰行仁難言仁亦不得不難矣司馬牛問君子子曰君子不憂不懼孔安國曰牛兄桓魋將為亂牛自宋來學常憂懼故孔子解之曰不憂不懼斯可謂君子巳乎子曰內省不疚夫何憂何懼苞氏曰疚病也內省無罪惡無可憂懼也司馬牛憂曰人皆有兄弟我獨亡鄭之曰牛兄桓魋行惡死亡無日我為無兄弟也子夏曰商聞之矣死生有命冨貴在天君子敬而無失與人恭而有禮四海之內皆為兄弟也君子何患乎無兄弟也苞氏曰君子疏惡而友賢九州之人皆可以禮親之子張問明子曰浸潤之譛膚受之訴不行焉可謂明也巳矣鄭玄曰譛人之言如水之浸潤以漸成人之禍馬融曰膚受皮膚外語非其內實也浸潤之譛膚受之訴不行焉可謂逺也巳矣馬融曰無此二者非伹為明其德行髙逺人莫能及之子貢問政子曰足食足兵使民信之矣子貢曰必不得巳而去於斯三者何先曰去兵曰必不得巳而去於斯二者何先曰去食自古皆有死民不信不立孔安國曰死者古今常道人皆有之治邦不可失信也棘子城曰君子質而巳矣何以文為矣鄭玄曰舊説云棘子城衛大夫也子貢曰惜乎夫子之説君子也駟不及舌鄭玄曰惜乎夫子之説君子也過言一出駟馬追之不及舌文猶質也質猶文也虎豹之鞹猶犬羊之鞹也孔安國曰皮去毛曰鞹虎豹與犬羊别者正以毛文異耳今使文質同者何以别虎豹與犬羊邢哀公問於有若曰年飢用不足如之何有若對曰盍徹乎鄭玄曰盍者何不也周法十一而稅謂之徹徹通也為天下通法也曰二吾猶不足如之何其徹也孔安國曰二謂十二而稅也對曰百姓足君孰與不足百姓不足君孰與足孔安國曰孰誰也子張問崇德辨惑苞氏曰辨别也子曰主忠信徙義崇德也苞氏曰徙義見義則徙意從之愛之欲其生也惡之欲其死也既欲其生又欲其死是惑苞氏曰愛惡當有常一欲生之一欲死之是心惑也誠不以冨亦祗以異鄭玄曰此詩小雅也祗適也言此行誠不可以致冨適以足為異耳取此詩之異義以非之也齊景公問政於孔子孔子對曰君君臣臣父父子子孔安國曰當此時陳桓制齊君不君臣不臣故以此對也公曰善哉信如君不君臣不臣父不父子不子雖有粟吾豈得而食諸孔安國曰言將危也陳氏果滅齊也子曰片言可以折獄者其由也與孔安國曰片猶偏也聽訟必須兩辭以定是非偏信一言以折獄者唯子路可也子路無宿諾宿猶豫也子路篤信恐臨時多故故不豫䛯也子曰聽訟吾猶人也苞氏曰言與人等必也使無訟乎王肅曰化之在前也子張問政子曰居之無倦行之以忠王肅曰言為政之道居之於身無得懈倦行之於民必以忠信也子曰君子博學於文約之以禮亦可以弗畔矣夫弗畔不違道也子曰君子成人之美不成人之惡小人反是季康子問政於孔子孔子對曰政者正也子帥而正孰敢不正鄭玄曰季康子魯上卿諸臣之帥也季康子患盜問於孔子孔子對曰苟子不欲雖賞之不竊孔安國曰欲情欲也言民化於上不從其所令從其所好也季康子問政於孔子曰如殺無道以就有道何如孔安國曰就成也欲多殺以止姧也孔子對曰子為改焉用殺子欲善而民善矣君子之德風也小人之德草也草尚之風必偃孔安國曰亦欲令康子先自正也偃仆加草以風無不仆者猶民之化於上也子張問士何如斯可謂之達也子曰何哉爾所謂達者矣子張對曰在邦必聞在家必聞鄭玄曰言士之所在皆能有名譽也子曰是聞也非達也夫達者質直而好義察言而觀色慮以下人馬融曰常有謙退之志察言語見顔色知其所欲其念慮常欲以下人也在邦必達在家必達馬融曰謙尊而光卑而不可踰也夫聞者色取仁而行違居之不疑馬融曰此言佞人也佞人假仁者之色行之則違安居其偽而不自疑者也在邦必聞在家必聞馬融曰佞人黨多也樊遲從逰於舞雩之下苞氏曰舞雩之處有壇墠樹木故其下可遊也曰敢問崇德修慝辨惑孔安國曰慝惡也修治也治惡為善也子曰善哉問先事後得非崇德與孔安國曰先勞於事然後得報也攻其惡毋攻人之惡非修慝與一朝之忿忘其身以及其親非惑與樊遲問仁子曰愛人問知子曰知人樊遲未達子曰舉直錯諸抂能使枉者直苞氏曰舉正直之人用之廢置邪枉之人則皆化為直也樊遲退見子夏曰嚮也吾見於夫子而問知子曰舉直錯諸枉能使抂者直何謂也子夏曰冨哉是言乎孔安國曰冨盛也舜有天下選於衆舉皋陶不仁者逺矣湯有天下選衆舉伊尹不仁者逺矣孔安國曰言舜湯有天下選擇於衆舉皋陶伊尹則不仁者逺矣仁者至矣子貢問友子曰忠告而以善導之否則止無自辱焉苞氏曰忘告以是非告之也以善導之不見從則止必言之或見辱也曽子曰君子以文會友孔安國曰友以文德合也以友輔仁孔安國曰友有相切磋之道所以輔成巳之仁也論語卷第六經二千六十二字注一千九百四十六字
