body:
  text: 論語序叙曰漢中壘校尉劉向言魯論語二十篇皆孔子弟子記諸善言也太子太傅夏侯勝前將軍蕭望之丞相韋賢及子玄成䓁傳之齊論語二十二篇其二十篇中章句頗多於魯論瑯瑘王卿及膠東庸生昌邑中尉王吉皆以教之故有魯論有齊論魯恭王時甞欲以孔子宅爲宮壞得古文論語齊論有問王知道多於魯論二篇古論亦無此二篇分堯曰下章子張問以爲一篇有兩子張凢二十一篇篇次不與齊魯論同安昌侯張禹夲受魯論兼講齊説善從之號曰張侯論爲丗所貴苞氏周氏章句出焉古論唯愽士孔安國爲之訓說而丗不傳至順帝時南郡太守馬融亦爲之訓說漢末太司農鄭玄就魯論篇章考之齊古以爲之註近故司空陳羣太常王肅博士周生烈皆爲義說前世傳受師說雖有異同不爲訓解中間爲之訓解至于今多矣所見不同㸦有得失今集諸家之善說記其姓名有不安者頗爲改易名曰論語集解光禄大夫關内侯臣孫邕光禄大夫臣鄭冲㪚騎常侍中領軍安鄉亭侯臣曹羲侍中臣荀顗尚書駙馬都尉關内侯臣何晏䓁上
