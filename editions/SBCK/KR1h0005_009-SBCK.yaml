body:
  text: 論語陽貨第十七何晏集解九卄四章陽貨欲見孔子孔子不見孔安國曰陽貨陽虎也季氏家臣而專魯國之政欲見孔子使仕也歸孔子豚孔安國曰欲使徃謝故遺孔子豚也孔子時其亡也而徃拜之遇諸塗孔安國曰塗道也於道路與相逄也謂孔子曰来予與爾言曰懷其寳而迷其􅀖可謂仁乎曰不可馬融曰言孔子不仕是懷寳也知國不治而不為政是迷􅀖也好從事而亟失時可謂智乎曰不可孔安國曰言孔子拪拪好從事而數不遇失時不為有智也日月逝矣歳不我與馬融曰年老嵗月巳徃當急仕也孔子曰諾吾將仕矣孔安國曰以順辭免害也子曰性相近也習相逺也孔安國曰君子慎所習也子曰唯上智與下愚不移孔安國曰上智不可強使為􅁖下愚不可使強賢也子之武城聞絃歌之聲孔安國曰子游為武城宰夫子莞爾而􅀏莞爾小􅀏貌曰割鷄焉用牛刀孔安國曰言治小何湏用大道子游對曰昔者偃也聞諸夫子曰君子學道則愛人小人學道則易使孔安國曰道禮樂也樂以和人人和則易使也子曰二三子孔安國曰從行者也偃之言是也前言戯之耳孔安國曰戯以治小而用大道公山不擾以費畔召子欲徃孔安國曰不擾為季氏宰與陽虎共執季桓子而召孔子也子路不恱曰未之也巳何必公山氏之之也孔安國曰之􅃴也無可之則止耳何必公山氏之􅃴子曰夫召我者而豈徒哉如有用我者吾其爲東周乎興周道於東方故曰東周子張問仁於孔子孔子對曰能行五者於天下為仁矣請問之曰恭寛信敏惠恭則不侮孔安國曰不見侮慢也寛則得衆信則人任焉敏則有功孔安國曰應事疾則多成功也惠則足以使人佛肹召子欲徃孔安國曰晉大夫趙簡子之邑􅈗子路曰昔者由也聞諸夫子曰親於其身為不善者君子不入不入其國佛􅆄以中牟叛子之徃也如之何子曰然有是言曰不曰堅乎磨而不磷不曰白乎􅄺而不緇孔安國曰磷薄也􅄺可以染皂者言至堅者磨之而不薄至白者染之􅄺不黒君子雖在濁亂濁亂不能汚也吾豈匏􅀲也哉焉能繋而不食匏瓠也言瓠匏􅀲得繋一處者不食故也吾自食物當東西南北不得如不食之物繋滯一處也子曰由也汝聞六言六蔽矣乎六言六蔽下六事謂仁智信直勇剛也對曰未也居吾語汝孔安國曰子路起對故使還坐也好仁不好學其蔽也愚孔安國曰仁者愛物不知所以裁之則愚好知不好學其蔽也蕩孔安國曰蕩無所適中也好信不好學其蔽也賊孔安國曰父子不知相爲隱之輩好直不好學其蔽也絞好勇不好學其蔽也亂好剛不好學其蔽也狂孔安國曰狂妄抵觸人子曰小子何莫學夫詩苞氏曰小子門人也詩可以興孔安國曰興引譬連類可以􅀚鄭玄曰􅀚觀風俗之盛衰可以羣孔安國曰羣居相切磋也可以怨孔安國曰怨刺上政邇之事父逺之事君孔安國曰邇近也多識於鳥獸草木之名子謂伯魚曰女為周南邵南矣乎人而不為周南邵南其猶正牆面而立也與馬融曰周南邵南國風之始淑女以配君子三綱之首王教之端故人而不為如向牆而立子曰禮云禮云玉帛云乎哉鄚玄曰玉珪璋之屬帛束帛之屬言禮非伹崇此玉帛而巳所貴者乃貴其安上治民也樂云樂云鍾皷云乎哉馬融曰樂之所貴者移風易俗非謂鍾皷而巳也子曰色厲而内荏孔安國曰荏柔也謂外自矝厲而内柔佞者譬諸小人其猶穿窬之盗也與孔安國曰為人如此猶小人之有盗心穿穿壁窬窬牆之也子曰郷原德之賊也周生烈曰所至之郷輙原其人情而為巳意以待之是賊亂德者也一曰郷向也古字同謂人不能剛毅而見人輙原其趣向容媚而合之言此所以賊德也子曰道聽而塗􅀃德之棄馬融曰聞之於道路則傳而􅀃之子曰鄙夫可與事君哉孔安國曰言不可與事君其未得之患得之患得之者患不能得之楚俗言既得之患失之苟患失無所不至矣鄭玄曰無所不至者言邪媚無所不為也子曰古者民有三疾今也或是之亡也苞氏曰言古者民疾與今時異也古之狂也肆苞氏曰肆極意敢言也今之狂也蕩孔安國曰蕩無所據古之矝也㢘馬融曰有㢘隅也今之矝也忿戾孔安國曰􅁖理多怒古之愚也直今之愚也詐而巳矣子曰􅁖紫之奪朱孔安國曰朱正色紫間色之好者􅁖其邪好而奪正色􅁖鄚聲之亂雅樂苞氏曰鄚聲􅁋聲之哀者􅁖其奪雅樂也􅁖利口之覆􅀖家孔安國曰利口之人多言少實苟能恱媚時君傾覆其國家也子曰予欲無言子貢曰子如不言則小子何述焉言之為益少故欲無言也子曰天何言哉四時行焉百物生焉天何言哉孺悲欲見孔子孔子辭之以疾將命者出户取瑟而歌使之聞之孺悲鲁人也孔子不欲見故辭以疾為其將命者不知巳故歌令將命者悟所以令孺悲思也宰我問三年之䘮期巳久矣君子三年不為禮禮必壞三年不為樂樂必崩舊􅂖既沒新􅂖既升鑚燧改火期可巳矣馬融曰周書月令有更火春取榆栁之火夏取􅀥杏之火季􅁨取乗柘之火秋取柞楢之火冬取槐檀之火一年之中鑚火各異木故曰改火也子曰食夫稻也衣夫錦也於女安乎曰安之女安則為之夫君子之居䘮食旨不甘聞樂不樂居處不安故不為也今女安則為之孔安國曰旨羙也責其無仁於親故再言女安則為之􅈗我出曰予之不仁也子生三年然後免於父母之懷馬融曰子生未三嵗爲父母所懐抱也夫三年之䘮天下之通䘮也孔安國曰自天子達於庶人予也有三年之愛於其父母乎孔安國曰言子之於父母欲報之德昊天罔極而予也有三年之愛也子曰飽食终日無所用心難矣哉不有􅀶弈者乎為之猶賢乎巳為其無所據樂善生􅁋慾子路曰君子尚勇乎子曰君子義以為上君子有勇而無義為亂小人有勇而無義為盗子貢問曰君子亦有􅁖乎子曰有􅁖􅁖稱人之􅁖者苞氏曰好稱􅀃人􅁖所以為􅁖也􅁖居下流而訕上者孔安國曰訕謗毀也􅁖勇而無禮者􅁖果敢而窒者馬融曰窒窒塞也曰賜也亦有􅁖也􅁖徼以為智者孔安國曰徼抄也抄人之意以為巳有􅁖不遜以為勇者􅁖訐以為直者苞氏曰訐謂政發人之隂私子曰唯女子與小人為難飬也近之則不遜逺之則怨子曰年四十而見􅁖焉其终也巳鄭玄曰年在不惑而爲人所􅁖终無善行也論語微子第十八何晏集解九十一章微子去之箕子爲之奴比于諌而死馬融曰微箕二國名子爵也微子纣之庶兄箕子比干纣之諸父也微子見纣無道早去之箕子詳狂為奴比干以諌而見殺也孔子曰殷有三仁焉仁者愛人三人行各異而同稱仁以其俱在憂亂寧民也栁下惠爲士師孔安國曰士師典獄之官三黜人曰子未可以去乎曰直道而事人焉徃而不三黜孔安國曰苟直道以事人所至之國俱當復三黜枉道而事人何必去父母之􅀖齊景公待孔子曰若季氏則吾不能以季孟之間待之孔安國曰魯三卿季氏為上卿㝡責孟氏為下卿不用事言待之以二者之間曰吾老矣不能用也孔子行以聖道難成故云老矣不能用齊人歸女樂季桓子受之三日不朝孔子行孔安國曰桓子季孫斯也使定公受齊之女樂君臣相與􅀚之廢朝禮三日也楚狂接輿歌而過孔子之門孔安國曰接輿楚人也詳狂而來歌欲以感切孔子曰鳯兮鳯兮何德之衰也孔安國曰比孔子於鳯鳥也鳯鳥待聖君而乃見非孔子周行求合故曰哀之也徃者不可諌也孔安國曰巳徃所行不可􅂧諫止來者猶可追也孔安國曰自今以来可追自止避亂隱居巳而巳而今之從政者殆而孔安國曰巳而者言丗亂巳甚不可􅂧治再言之者傷之甚也孔子下欲與之言趨而避之不得與之言苞氏曰下下車也長沮桀溺耦而耕孔子過之使子路問津焉鄭玄曰長沮桀溺隱者也耜廣五寸二耜為耦津濟渡處長沮曰夫執輿者為誰子路曰為孔丘曰是魯孔丘與對曰是也曰是知津矣馬融曰言數周流自知津處也問於桀溺桀溺曰子爲誰曰為仲由曰是鲁孔丘之徒與對曰然曰滔滔者天下皆是也而誰以易之孔安國曰淊滔者周流之貌也言當今天下洽亂同空舎此􅃴彼故曰誰以易之且而與其從避人之士豈若從避丗之士哉士有避人之法有避丗之法長沮桀溺謂孔子為士從避人之法也巳為士則從避丗之法也耰而不輟鄭玄曰耰覆種也輟止也覆種不止不以津告也子路行以告夫子憮然為其不達巳意而便非巳也曰鳥獸不可與同羣也孔安國曰隱居於山林是與鳥獸同羣吾非斯人之徒與而誰與孔安國曰吾自當與此天下人同羣安能去人從鳥獸居乎天下有道丘不與易也孔安國曰言凡天下有道者丘皆不與易之巳大而人小故也子路從而後遇丈人以杖荷蓧苞氏曰丈人老者也蓧竹器名也子路問曰子見夫子乎丈人曰四體不勤五􅂖不分孰為夫子苞氏曰丈人曰不勤勞四體不分殖五􅂖誰為夫子而索之耶植其杖而芸孔安國曰植􅀝也除草曰芸子路拱而立未知所以荅也止子路宿殺雞爲􅁰而食之見其二子焉明日子路行以告子曰隱者也使子路反見之至則行矣孔安國曰子路反至其家丈人出行不在子路曰不仕無義鄭玄曰㽞言以語丈人之二子也長㓜之節不可廢也君臣之義如之何其可廢也孔安國曰言女知父子相飬不可廢反可廢君臣之義耶欲㓗其身而亂大倫苞氏曰倫道也理也君子之仕也行其義也道之不行也巳知之矣苞氏曰言君子之仕所以行君臣之義也不自必道得行孔子道不見用自巳知之也逸民伯夷叔齊虞仲夷逸朱張栁下惠少連逸民者節行超逸者包氏曰此七人皆逸民之賢者也子曰不降其志不辱其身者伯夷叔齊與鄭玄曰言其直巳之心不入庸君之朝謂栁下惠少連降志辱身矣言中倫行中慮其斯而巳矣孔安國曰伹能言應倫理行應思慮若此而巳謂虞仲夷逸隱居放言苞氏曰放置也置不􅂧言丗務也身中清廢中􅁠馬融曰清純㓗也遭丗亂身廢棄以免患合於􅁠也我則異於是無可無不可馬融曰亦不必進亦不必退唯義所在大師摯􅃴齊亞飯干􅃴楚孔安國曰亞次也次飯樂師也摯干皆名也三飯繚􅃴蔡四飯缺􅃴􅁗苞氏曰三飯四飯樂章名也各異師繚缺皆名鼔方叔入于河苞氏曰鼓擊鼓者方叔名也入謂居其河内也播鞀武入于漢孔安國曰播猶揺也武名也少師陽擊磬襄入于海孔安國曰鲁哀公時禮毀樂崩樂人皆去陽襄皆名周公語鲁公孔安國曰鲁公周公之子伯禽封於鲁曰君子不施其親孔安國曰施昜也不以他人易其親也不使大臣怨乎不以孔安國曰以用也怨不見聽用故舊無大故則不棄也母求􅇱於一人孔安國曰大故謂􅁖逆之事周有八士伯達伯适仲突仲忽叔夜叔夏季隨季騧苞氏曰周時四乳得八子皆爲顯士故記之論語卷第九經一千六百五十字注一千七百七十八字
