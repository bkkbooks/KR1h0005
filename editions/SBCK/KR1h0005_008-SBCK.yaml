body:
  text: 論語衛靈公第十五何晏集解凢卅章衛靈公問陳於孔子孔安國曰軍陳行列之法也孔子對曰爼豆之事則甞聞之矣孔安國曰爼豆禮器也軍旅之事未之學也鄭玄曰万二千五百人為軍五百人為旅軍旅未事本未立則不可敎以末事也明日遂行在陳絶粮從者病莫能興孔安國曰從者弟子也興起也孔子去衛如曹曹不容又之宋遭匡人之難又之陳㑹吴伐陳陳亂故乏食也子路愠見曰君子亦窮乎子曰君子固窮小人窮斯濫矣濫溢也君子固亦有窮時伹不如小人窮濫溢為非也子曰賜也汝以予為多學而識之者與對曰然孔安國曰然謂多學而識之也非與孔安國曰問今不然邪也曰非也予一以貫之善有元事有㑹天下殊塗而同歸百慮而一致知其元則衆善舉矣故不待多學一以知之也子曰由知德者鲜矣王肅曰君子固窮而子路愠見故謂之少於知徳者也子曰無為而治者其舜也與夫何為哉恭巳正南面而已矣言任官得其人故無爲而治也子張問行子曰言忠信行䔍敬雖蠻㹮之􅀖行矣言不忠信行不䔍敬雖州里行乎哉鄭玄曰万二千五百家爲州五家爲隣五隣爲里行乎哉言不可行也立則見其參然於前也在輿則見其􅀝於衡也夫然後行也苞氏曰衡扼也言思念忠信立則常想見參然在前在輿則若􅀝衡扼也子張書諸紳孔安國曰紳大帶也子曰直哉史魚孔安國曰衛大夫史鰌也􅀖有道如矢􅀖無道如矢孔安國曰有道無道行直如矢不曲也君子哉蘧伯玉􅀖有道則仕􅀖無道則可卷而懷也苞氏曰卷而懷謂不與時政柔順不忤於人也子曰可與言而不與言失人不可與言而與言之失言知者不失人亦不失言子曰志士仁人無求生以害仁有殺身以成仁孔安國曰無求生而害仁死而後成仁則志士仁人不愛其身也子貢問為仁子曰工欲善其事必先利其器居是􅀖也事其大夫之賢者友其士之仁者也孔安國曰言二以利器為用人以賢友為助也顔淵問為􅀖子曰行夏之時據見万物之生以為四時之始取其昜知也乗殷之輅馬融曰殷車曰大輅左傳曰大輅越席也昭其儉也服周之冕苞氏曰冕禮冠也周之禮文而􅇱也取其黈纊塞耳不任視聴也樂則韶舞韶舜樂也盡善盡羙故取之放鄭聲逺佞人鄭聲滛佞人殆孔安國曰鄭聲佞人亦俱能感人心與雅樂賢人同而使人滛乱危殆故當放逺也子曰人而無逺慮必有近憂子曰巳矣乎吾未見好徳如好色者也子曰臧文仲其􅀼位者與知柳下惠之賢而不與立也孔安國曰柳下惠展禽也知其賢而不舉為􅀼位也子曰躬自厚而薄責於人則逺怨矣孔安國曰自責巳厚責人薄所以逺怨咎也子曰不曰如之何孔安國曰不曰如之何者猶不曰奈是何也如之何者吾末如之何也巳矣孔安國曰如之何者言禍難巳成吾亦無如之何也子曰群居終日言不及義好行小慧難矣哉鄭玄曰小慧謂小小才知也難矣哉言終無成也子曰君子義以為質禮以行之遜以出之信以成之君子哉子曰君子病無能焉不病人之不巳知也子曰君子疾􅃿丗而名不稱焉疾猶病也子曰君子求諸己小人求諸人君子責己小人責人也子曰君子矜而不爭苞氏曰矜矜莊也群而不黨孔安國曰黨助也君子雖衆不相私助義之與比之也子曰君子不以言舉人苞氏曰有言者不必有徳故不可必言舉人也不以人廢言子貢問曰有一言而可以終身行者乎子曰其恕乎已所不欲勿施於人也子曰吾之於人也誰毀誰譽如有可譽者其有所試矣苞氏曰所譽輙試以事不空譽而巳矣斯民也三代之所以直道而行也馬融曰三代夏殷周也用民如此無所阿私所以云直道而行也子曰吾猶及史之闕文也苞氏曰古之史於書字有疑則闕之以待知者也有馬者借人乗之今則亡矣夫苞氏曰有馬不能調良則借人使習之孔子自謂及見其人如此至今無有矣言此者以俗多穿鑿也子曰巧言亂徳小不忍亂大謀孔安國曰巧言利口則亂徳義小不忍則亂大謀也子曰衆􅁖之必察焉衆好之必察焉王肅曰或衆阿黨比周或其人特立不群故好􅁖不可不寮也子曰人能弘道非道弘人也材大者道随大材小者道随小故不能弘人也子曰過而不改是謂過矣子曰吾甞終日不食終夜不􅃦以思無益不如學也子曰君子謀道不謀食耕也餒在其中矣學也禄在其中矣君子憂道不憂貧也鄭玄曰餒餓也言人雖念耕而不學故飢餓學則得禄雖不耕而不飢􅂆人學也子曰知及之仁不能守之雖得之必失之苞氏曰知能及治其官而仁不能守雖得之必失之也知及之仁能守之不荘以蒞之則民不敬苞氏曰不嚴以臨之則民不敬從上也知及之仁能守之荘以蒞之動之不以禮未善也王肅曰動必以禮然後善也子曰君子不可小知而可大受也小人不可大受也而可小知也君子之道深逺不可以小了知而可大受也小人之道淺近可以小了知而不可大受也子曰民之於仁也甚於水火馬融曰水火與仁皆民所仰而生者也仁最爲甚也水火吾見蹈而死者矣未見蹈仁而死者也馬融曰蹈水火或時殺人蹈仁未甞殺人也子曰當仁不讓於師孔安國曰當行仁之事不􅂧讓於師行仁急也子曰君子貞而不諒孔安國曰貞正也諒信也君子之人正其道耳言不必信也子曰事君敬其事而後其食孔安國曰先盡力然後食禄也子曰有教無􅀋馬融曰言人在見教無有種類也子曰道不同不相為謀子曰辭達而巳矣九事莫過於實足也辭達則足矣不煩文艶之辭也師冕見孔安國曰師樂人盲者也名冕也及階子曰階也及席也子曰席也皆坐子告之曰某在斯某在斯孔安國曰歴告以坐中人姓字及所在處也師冕出子張問曰與師言之道與子曰然固相師之道也馬融曰相導也論語季氏第十六何晏集解九十四章季氏將伐顓􅁷冉有季路見於孔子曰季氏將有事於顓􅁷孔安國曰顓􅁷宓義之後風姓之國本鲁之附庸當時臣属鲁季氏貪其地欲滅而有之冉有與季路為季氏臣来告孔子也孔子曰求無乃爾是過與孔安國曰冉求為季氏宰相其室為之聚斂故孔子獨疑求教也夫顓􅁷昔者先王以為東䝉主孔安國曰使主􅀕䝉山也且在􅀖域之中矣孔安國曰鲁七百里之􅀖顓􅁷為附庸在其域中也是社稷之臣也何以為伐也孔安國曰巳属鲁為社稷之臣何用滅之為也冉有曰夫子欲之吾二臣者皆不欲也孔安國曰歸咎於李氏也孔子曰求周任有言曰陳力就列不能者止馬融曰周任古之良吏也言當陳才事度巳所任以就其位不能則當止也危而不持顛而不扶則將焉用彼相矣苞氏曰言輔相人者當持危扶顛若不能何用相為也且爾言過矣虎兕出於柙􅀛玉毀櫝中是誰之過與馬融曰柙檻也櫝樻也非典守者之過邪也冉有曰今夫顓􅁷固而近於費馬融曰固謂城郭完堅兵甲利也費季氏之邑也今不取後丗必為子孫憂孔子曰求君子疾夫孔安國曰疾如汝之言也舎曰欲之而必更爲之辞孔安國曰舎其貪利之説更作佗辭是所疾也丘也聞有國有家者不患寡而患不均孔安國曰國者諸侯家者卿大夫也不患圡地人民之寡少患政治之不均平不患貧而患不安孔安國曰憂不能安民耳民安則國冨也盖均無貪和無寡安無傾苞氏曰政教均平則不患貪矣上下和同不患寡矣小大安寧不傾危也矣夫如是故逺人不服則修文徳以来之既来之則安之今由與求也相夫子逺人不服而不能来也􅀖分崩離折而不能守也孔安國曰民有異心曰分欲去曰崩不可㑹聚曰離折也而謀動干戈於􅀖内孔安國曰干楯也戈㦸也吾恐季孫之憂不在於顓􅁷而在蕭牆之内也鄭玄曰蕭之言肅也蕭牆謂屏也君臣相見之禮至屏而加肅敬焉是以謂之蕭牆後季氏之家臣陽虎果囚季桓子也孔子曰天下有道則禮樂征伐自天子出天下無道則禮樂征伐自諸侯出自諸侯出盖十丗希不失矣孔安國曰希少也周幽王為犬戎所殺平王東遷周始微弱諸侯自作禮樂專彺伐始於隱公至照公十丗矢政死於乾侯也自大夫出五丗希不失矣孔安國曰季文子初得政至桓子五世爲家臣陽虎所囚也陪臣執國命三丗希不失矣馬融曰陪重也謂家臣也陽氏爲季氏家臣至虎三丗而出奔齊也天下有道則政不在大夫孔安國曰制之由君也天下有道則庶人不議孔安國曰無所非議也孔子曰禄之去公室五丗矣鄭玄曰言此之時魯定公之初也魯自東門襄仲殺文公之子赤而立宣公於是政在大夫爵禄不從君出至定公為五丗也政逮大夫四丗矣鄭玄曰文子武子悼子平子也故夫三桓之子孫微矣孔安國曰三桓者謂仲孫叔孫季孫也三卿皆出桓公也故曰三桓也仲孫氏改其氏稱孟氏至哀公皆衰也孔子曰益者三友損者三友友直友諒友多聞益矣友便僻馬融曰便巧辟人所忌以求容媚也友善柔馬融曰面柔也友便佞損矣鄭玄曰便辨也謂佞而辨也孔子曰益者三樂損者三樂樂節禮樂動得禮樂之節也樂噵人之善樂多賢友益矣樂驕樂孔安國曰恃尊貴以􅀰恣也樂佚遊王肅曰佚遊出入不知節也樂宴樂損矣孔安國曰宴樂沉荒􅁋瀆也三者自損之道也孔子曰侍於君子有三愆孔安國曰愆過也言未及之而言謂之躁鄭玄曰躁不安静也言及之不言謂之隱孔安國曰隱匿不盡情實也未見顔色而言謂之􅎩周生烈曰未見君子顔色所趣向而便逆先意語者猶􅎩者也孔子曰君子有三戒少之時血氣未定戒之在色及其壯也血氣方剛戒之在闘及其老也血氣既衰戒之在得孔安國曰得貪得也孔子曰君子有三畏畏天命順􅁻逆凶天之命也畏大人大人即聖人與天地合其德者也畏聖人之言深逺不可易知則聖人之言也小人不知天命而不畏也恢䟽故不知畏也狎大人直而不肆故狎之也侮聖人之言不可小知故侮之也孔子曰生而知之者上也學而知之者次也困而學之又其次也孔安國曰困謂有所不通之也困而不學民斯爲下矣孔子曰君子有九思視思明聽思聦色思温貌思恭言思忠事思敬疑思問忿思難見得思義孔子曰見善如不及見不善如探湯吾見其人矣吾聞其語孔安國曰探湯喻去􅁖􅍚也隱居以求其志行義以達其道吾聞其語矣未見其人也齊景公有馬千駟死之日民無得而稱焉孔安國曰千駟四千匹也伯夷升齊餓于首陽之下馬融曰首陽山在河東蒲坂華山之北河曲之中也民到干今稱之其斯謂與王肅曰此所謂以德爲稱者也陳亢問於伯魚曰子亦有異聞乎馬融曰以為伯魚孔子之子所聞當有異也對曰未也甞獨立孔安國曰獨立謂孔子也鯉趨而過庭曰學詩乎對曰未也曰不學詩無以言也鯉退而學詩他日又獨立鯉趨而過庭曰學禮乎對曰未也不學禮無以立也鯉退而學禮聞斯二矣陳亢退喜曰問一得三聞詩聞禮又聞君子之逺其子也􅀖君之妻君稱之曰夫人夫人自稱曰小童􅀖人稱之曰君夫人稱諸異􅀖曰寡小君異􅀖人稱之亦曰君夫人也孔安國曰小君君天人之稱也對異􅀖謙故曰寡小君當此時諸侯嫡妾不正稱號不審故孔子正言其禮也論語卷第八經一千七百七十四字注一千九百七十字
