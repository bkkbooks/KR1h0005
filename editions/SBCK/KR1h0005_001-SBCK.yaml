body:
  text: 論語學而第一何晏集解凢十六章子曰學而時習之不亦悦乎馬融曰子者男子之通稱謂孔子也王肅曰時者學者以時誦習之誦習以時學無廢業所以爲悦懌也有朋自逺方来不亦樂乎苞氏曰同門曰朋也人不知而不愠不亦君子乎愠怒也丸人有所不知君子不愠也有子曰孔安國曰弟子有若其爲人也孝悌而好犯上者鮮矣鮮少也上謂九在巳上者言孝悌之人必有恭順好欲犯其上者少也不好犯上而好作亂者未之有也君子務本本立而道生本基也基立而後可大成也孝悌也者其仁之本與先􅀎事父兄然後可乃仁成也子曰巧言令色鮮矣仁苞氏曰巧言好其言語令色善其顔色皆欲令人說之少􅀎有仁也曽子曰馬融曰弟子曽參也吾日三省吾身爲人謀而不忠乎與朋友交言而不信乎傳不習乎言九所傳之事得無素不講習而傳乎子曰導千乗之國馬融曰導謂爲之政教也司馬法六尺爲歩歩百爲畒畒百爲夫夫三爲屋屋三爲井井十爲通通十爲城城出革車一乗然則千乗之賦其地千城也居地方三百一十六里有竒唯公侯之封乃􅀎容之雖大國之賦亦不是過焉苞氏曰導治千乗之國者百里之國也古者井田方里爲井井十為乗百里之國􅃴千乗也馬融依周礼苞氏依王制孟子義疑故兩存焉之敬事而信苞氏曰爲國者舉事必敬慎與民必誠信也節用而愛人苞氏曰莭用不奢侈國以民爲本故愛飬也使民以時苞氏曰作使民必以其時不妨奪農務也子曰弟子入則孝出則悌謹而信汎愛衆而親仁行有餘力則以學文馬融曰文者古之遺文也子夏曰賢賢易色孔安國曰子夏弟子卜商也言以好色之心好賢則善也事父母􅀎竭其力事君􅀎致其身孔安國曰盡忠節不愛其身也與朋友交言而有信雖曰未學吾必謂之學矣子曰君子不重則不威學則不固孔安國曰固弊也一曰言人不敢重既無威學又不􅀎堅固識其義理也主忠信無友不如巳者過則勿憚改鄭玄曰主親也憚難也曽子曰愼終追逺民徳歸厚矣孔安國曰慎終者䘮盡其哀也追逺者祭盡其敬也人君行此二者民㐶其徳而皆歸於厚也子禽問於子貢曰夫子至於是􅀖也必聞其政求之與抑與之與鄭玄曰子禽弟子陳亢也子貢弟子姓端木名賜字子貢也尢恠孔子所至之􅀖必與聞其􅀖政求而得邪抑人君自願與爲治也子貢曰夫子温良恭儉讓以得之夫子之求也其諸異乎人求之與鄭玄曰言夫子行此五徳而得之與人求異明人君自願與爲治也子曰父在觀其志父􅃿觀其行孔安國曰父在子不得自專故觀其志而巳父沒乃􅀚其行也三年無改於父之道可謂孝矣孔安國曰孝子在喪哀慕猶若父在無所改於父之道也有子曰禮之用和為貴先王之道斯為羙小大由之有所不行知和而和不以禮節之亦不可行也馬融曰人知禮貴和而每事從和不以禮為節亦不可行也有子曰信近於義言可復也復猶覆也義不必信信不必義也以其言可反覆故曰近於義也恭近於禮逺耻辱也苞氏曰恭不合禮非禮也以其􅀎逺耻辱故曰近於禮也因不失其親亦可宗也孔安國曰因親也言所親不失其親亦可宗敬也子曰君子食無求飽居無求安鄭玄曰學者之志有所不暇也敏於事而愼於言就有道而正焉可謂好學也巳矣孔安國曰敏疾也有道有道徳者也正謂問事是非也子貢曰貧而無謟冨而無驕何如子曰可也孔安國曰未足多也未若貧而樂道富而好禮者也鄭玄曰樂謂志於道不以貧賤爲憂苦也子貢曰詩云如切如磋如琢如磨其斯之謂與孔安國曰􅀎貧而樂道冨而好禮􅀎自切磋琢磨者也子曰賜也始可與言詩巳矣告諸徃而知来者也孔安國曰諸之也子貢知引詩以成孔子義善取􅀋也故然之徃告以貧而樂道来荅以切磋琢磨者子曰不患人之不巳知患巳不知人也論語爲政第二何晏集解凢卄四章子曰爲政以徳譬如北辰居其所而衆星共之苞氏曰徳者無為譬猶北辰之不移而衆星共之子曰詩三百孔安國曰篇之大數也一言以蔽之苞氏曰蔽猶當也曰思無邪苞氏曰歸於正子曰導之以政孔安國曰政謂法教齊之以刑馬融曰齊整之以刑罰也民免而無恥孔安國曰苟免罪也導之以徳苞氏曰德謂道徳齊之以禮有恥且格格者正也子曰吾十有五而志乎學三十而立有所成立也四十而不惑孔安國曰不疑惑也五十而知天命孔安國曰知天命之終始也六十而耳順鄭玄曰耳順聞其言而知其微旨也七十而縱心所欲不踰矩馬融曰矩法也縱心所欲無非法也孟懿子問孝孔安國曰鲁大夫仲孫何忌懿謚也子曰無違樊遟御子告之曰孟孫問孝於我我對曰無違鄭玄曰孟孫不曉無違意將問於樊遲故告之樊遲弟子樊須也樊遲曰何謂也子曰生事之以禮死葬之以禮祭之以禮孟武伯問孝子曰父母唯其􅍚之憂馬融曰武伯懿子之子仲孫彘也武謚也言孝子不妄爲非唯疾病然後使父母憂耳也子游問孝孔安國曰子游弟子也姓言名偃也子曰今之孝者是謂􅀎飬至於犬馬皆􅀎有飬不敬何以别乎苞氏曰犬以守禦馬以代勞􅀎飬人者一曰人之所飬乃􅀎至於犬馬不敬則無以别孟子曰飬而弗愛豕畜也愛而弗敬也獸畜也子夏問孝子曰色難色難謂承望父母顔色乃爲難也有事弟子服其勞有酒食先生饌馬融曰先生謂父兄饌飲食也曽是以爲孝乎馬融曰孔子喻子夏曰服勞先食汝謂此爲孝乎未足爲孝也承順父母顔色乃爲孝耳也子曰吾與回言終日不違如愚孔安國曰囬弟子也姓顔字子淵鲁人也不違者無所恠問於孔子之言黙而識之如愚也退而省其私亦足以發回也不愚孔安國曰察其退還與二三子説釋道義發明大軆知其不愚也子曰視其所以以用也言視所其行用也􅀚其所由由經也言觀其所經從也察其所安人焉廋哉人焉廋哉孔安國曰廋匿也言􅀚人終始安有所匿其情也子曰温故而知新可以爲師矣温尋也尋繹故者又知新可以爲師也子曰君子不器苞氏曰器者各周其用至於君子無所不施也子貢問君子子曰先行其言而後從之孔安國曰疾小人多言而行不周也子曰君子周而不比孔安國曰忠信爲周阿黨爲比也小人比而不周子曰學而不思則罔苞氏曰學而不尋思其義理罔然無所得之也思而不學則殆不學而思終卒不得使人精神疲殆也子曰攻乎異端斯害也巳矣攻治善道有統故殊塗而同歸異端不同歸也子曰由誨汝知之乎孔安國曰由弟子也姓仲名由字子路也知之爲知之不知爲不知是知也子張學干禄鄭玄曰子張弟子姓顓孫名師字子張干求也禄禄位也子曰多聞闕疑慎言其餘則寡􅀹苞氏曰尤過也疑則闕之其餘不疑猶慎言之則少過也多見闕殆慎行其餘則寡悔苞氏曰殆危也所見危者闕而不行則少悔也言寡􅀹行寡悔禄在其中矣鄭玄曰言行如此雖不得禄得禄之道也哀公問曰何爲則民服苞氏曰哀公鲁君之謚也孔子對曰舉直錯諸枉則民服苞氏曰錯置也舉用正直之人廢置邪枉之人則民服其上也舉枉錯諸直則民不服季康子問使民敬忠以􅂆如之何孔安國曰鲁卿季孫肥也康諡也子曰臨之以荘則敬苞氏曰荘嚴也君臨民以嚴則民敬其上也孝慈則忠苞氏曰君􅀎上孝於親下慈於民則民忠也舉善而教不􅀎則民􅂆苞氏曰舉用善人而教不􅀎言則民􅂆也或謂孔子曰子奚不爲政苞氏曰或人以爲居位乃是爲政也子曰書云孝乎惟孝友于兄弟施於有政是亦爲政也奚其爲爲政也苞氏曰孝乎惟孝羙孝之辞也文于兄弟善於兄弟施行也所行有政道即是與爲政同也子曰人而無信不知其可也孔安國曰言人而無信其餘終無可也大車無輗小車無䡄其何以行之哉苞氏曰大車牛車也輗者轅端橫木以縛枙者也小車四馬車也䡄者轅端上曲拘衡者也子張問十丗可知也孔安國曰文質禮變也子曰殷因於夏禮所損益可知也周因於殷禮所損益可知也馬融曰所因謂三綱五常也所損益謂文質三統也其或繼周者雖百丗亦可知馬融曰物類相招勢数相生其變有常故可豫知也子曰非其􅀑而􅀕之謟也鄭玄曰人神曰􅀑非其祖孝而􅀕之是諂以求福也見義不為無勇孔安國曰義者所冝為也而不􅀎為是無勇也論語卷第一經一千四百七十字註一千五百一十三字
