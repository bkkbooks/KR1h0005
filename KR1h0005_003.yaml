body:
  text: 論語公冶長第五何晏集解凡草九章子謂公冶長可妻也雖在縲紲之中非其罪也以其子妻之孔安國曰公冶長弟子魯人也姓公冶名長也縲黑索紲攣也所以拘於罪人也子謂南容邦有道不廢邦無道免於刑戮以其兄之子妻之王肅曰南容弟子南宫縚也魯人也字子容不廢言見任用也子謂子賤孔安國曰子賤魯人弟子密不齊也君子哉若人魯無君子者斯焉取斯苞氏曰若人若此人也如魯無君子子賤安得此行而學行之子貢問曰賜也如何子曰汝器也孔安國曰言汝器用之人也曰何器也曰瑚璉也苞氏曰瑚璉者黍稷之器也夏曰瑚殷曰璉周曰簠簋宗廟器之貴者也或曰雍也仁而不佞馬融曰雍弟子仲弓名也姓冉也子曰焉用佞也禦人以給屢憎民不知其仁也焉用佞也孔安國曰屢數也佞人口辭捷給數為民之所憎之也子使􅃮雕開仕對曰吾斯之未能信孔安國曰開弟子也􅃮雕姓也開名也仕進之道未能信者未能究習也子說鄭玄曰喜其志道之深也子曰道不行乘桴浮於海從我者其由也與馬融曰桴編竹木也大者曰筏小者曰桴子路聞之喜孔安國曰喜與巳俱行矣子曰由也好勇過我無所取材鄭玄曰子路信夫子欲行故言好勇過我也無所取材者言無所取桴材也以子路不解微言故戲之耳也一曰子路聞孔子欲浮海便喜不復顧望故孔子歎其勇曰過我無所復取哉言唯取於巳也古材哉同孟武伯問子路仁乎子曰不知也孔安國曰仁道至大不可全名也又問子曰由也千乘之國可使治其賦也孔安國曰賦兵賦也不知其仁也求也何如子曰求也千室之邑百乘之家可使為之宰也孔安國曰千室之邑卿大夫之邑也卿大夫稱家諸侯千乘卿大夫故曰百乘也宰家臣也不知其仁也赤也何如子曰赤也束帶立於朝可使與賔客言也馬融曰赤弟子公西華也有容儀可使為行人之也不知其仁也子謂子貢曰女與回也孰愈孔安國曰愈猶勝也對曰賜也何敢望回回也聞一以知十賜也聞一以知二子曰弗如也吾與女弗如也苞氏曰既然子貢弗如復云吾與女俱不如者蓋欲以慰子貢心也宰豫晝寢苞氏曰宰豫弟子宰我也子曰朽木不可雕也苞氏曰朽腐也雕雕琢刻畫也糞圡之牆不可杇也王肅曰杇槾也二者喻雖施功猶不成也於豫與何誅孔安國曰誅責也今我當何責於汝乎深責之辭也子曰始吾於人也聽其言而信其行今吾於人也聽其言而觀其行於豫與改是孔安國曰改是始聽言信行今更察言觀行發於宰我之晝寢也子曰吾未見剛者或對曰申棖苞氏曰申棖魯人也子曰棖也欲焉得剛孔安國曰欲多情欲之也子貢曰我不欲人之加諸我也吾亦欲無加諸人也馬融曰加凌也子曰賜也非爾所及也孔安國曰言不能止人使不加非義於巳之也子貢曰夫子之文章可得而聞也章明也文彩形質著見可得以耳目修也夫子之言性與天道不可得而聞也巳矣性者人之所受以生也天道者元亨日新之道也深微故不可得而聞也子路有聞未能行唯恐有聞孔安國曰前所聞未及得行故恐後有聞不得並行也子貢問曰孔文子何以謂之文也孔安國曰孔文子衛大夫孔叔圉也文諡也子曰敏而好學不恥下問是以謂之文也孔安國曰敏者識之疾也下問問凡在巳下者也子謂子産有君子之道四焉孔安國曰子産鄭大夫公孫僑也其行巳也恭其事上也敬其飬民也惠其使民也義子曰晏平仲善與人交久而人敬之周生烈曰齊大夫晏姓也平諡也名嬰也子曰臧文仲居蔡苞氏曰臧文仲魯大夫臧孫辰也文諡也蔡國君之守龜也出蔡地因以為名焉長尺有二寸居蔡僣也山節藻梲苞氏曰節者栭也刻鏤為山也梲者梁上之楹盡為藻文也言其奢侈也何如其知也孔安國曰非時人謂以為知之子張問曰令尹子文孔安國曰令尹子文楚大夫姓鬪名㝅於搜也三仕為令尹無喜色三巳之無愠色舊令尹之攻必以告新令尹何如也子曰忠矣曰仁矣乎曰未知焉得仁孔安國曰伹聞其忠事未知其仁也崔子弒齊君陳文子有馬十乘棄而違之孔安國曰皆齊大夫也崔杼作亂陳文子惡之捐四十匹馬違而去之至於他邦則又曰猶吾大夫崔子也違之至一邦則又曰猶吾大夫崔子也違之何如子曰清矣曰仁矣乎曰未知焉得仁孔安國曰文子避惡逆無道求有道當春秋時臣淩其君皆如崔子無有可者也季文子三思而後行子聞之曰再思斯可矣鄭玄曰季文子魯大夫季孫行父也文諡也文子忠而有賢行其舉事寡過不必及三思之也子曰寧武子馬融曰衛大夫寧喻也武諡也邦有道則知邦無道則愚其知可及也其愚不可及也孔安國曰詐愚似實故曰不可及也子在陳曰歸與歸與吾黨之小子狂簡斐然成章不知所以裁之也孔安國曰簡大也孔子在陳思歸欲去曰吾黨之小子狂者進取於大道妄穿鑿以成文章不知所以裁制我當歸以裁制之耳遂歸也子曰伯夷叔齊不念舊惡怨是用希孔安國曰伯夷叔齊孤竹君之二子也孤竹國名也子曰孰謂微生髙直孔安國曰微生姓也名高魯人也或乞醯焉乞諸其鄰而與之孔安國曰乞之四鄰以應求者用意委曲非為直人也子曰巧言令色足恭孔安國曰足恭便僻之貌也左丘明恥之丘亦恥之孔安國曰左丘明魯大夫也匿怨而友其人孔安國曰心內相怨而外詐親也左丘明恥之丘亦恥之顔淵季路侍子曰盍各曰爾志子路曰願車馬衣輕裘與朋友共敝之而無憾孔安國曰憾恨也顔淵曰願無伐善孔安國曰自無稱巳之善也無施勞孔安國曰無以勞事置施於人也子路曰願聞子之志子曰老者安之朋友信之少者懷之子曰巳矣乎吾未見能見其過而內自訟者也苞氏曰訟猶責也言人有過莫能自責也子曰十室之邑必有忠信如丘者焉不如丘之好學者也論語雍也第六何晏集解凡卅章子曰雍也可使南面也苞氏曰可使南面者言任諸侯可使治國也仲弓問子桑伯子王肅曰伯子書傳無見焉子曰可也簡以其能簡故曰可也仲弓曰居敬而行簡以臨其民不亦可乎孔安國曰居身敬肅臨下寬略則可也居簡而行簡無乃太簡乎苞氏曰伯子之簡大簡也子曰雍之言然哀公問曰弟子孰為好學孔子對曰有顔回者好學不遷怒不二過不幸短命死矣今也則亡未聞好學者也凡人任情喜怒違理顔淵任道怒不過分遷者移也怒當其理不移易也不二過者有不善未嘗復行也子華使於齊冉子為其母請粟子曰與之釡馬融曰子華弟子公西華赤字也六斗四升曰釡也請益曰與之庾苞氏曰十六斗為庾也冉子與之粟五秉馬融曰十六斛曰秉五秉合八十斛也子曰赤之適齊也乘肥馬衣輕裘吾聞之也君子周急不繼冨鄭玄曰非冉有與之太多也原思為之宰苞氏曰弟子原憲也思字也孔子為魯司冦以原憲為家邑宰也與之粟九百辭孔安國曰九百九百斗也辭讓不受也子曰母孔安國曰祿法所當受母以讓也以與爾鄰里鄉黨乎鄭玄曰五家為鄰五鄰為里万二千五百家為鄉五百家為黨也子謂仲弓曰犂牛之子騂且角雖欲勿用山川其舍諸犂雜文也騂赤色角者角周正中犧牲也雖欲以其所生犂而不用山川寧肯舍之乎言父雖不善不害於其子之美也子曰回也其心三月不違仁其餘則日月至焉而巳矣言餘人暫有至仁時唯回移時而不變也季康子問仲由可使從政也與子曰由也果苞氏曰果謂果敢决斷也於從政乎何有曰賜也可使從政也與子曰賜也達孔安國曰達謂通於物理也於從政乎何有曰求也可使從政也與子曰求也藝孔安國曰藝曰多才能也於從政乎何有季氏使閔子騫為費宰孔安國曰費季氏邑也季氏不臣而其邑宰叛聞閔子騫賢故欲用之也閔子騫曰善為我辭焉孔安國曰不欲為季氏宰語使者曰善為我作辭說令不復召我之也如有復我者孔安國曰復我者重來召我也則吾必在汶上矣孔安國曰去之汶水上欲北如齊也伯牛有􅍚馬融曰伯牛弟子冉耕也子問之自牖執其手苞氏曰有惡􅍚不欲見人故孔子從牗執其手也曰亡之孔安國曰亡喪也疾甚故持其手曰喪之也命矣夫斯人也而有斯􅍚也斯人也而有斯􅍚也苞氏曰再言之者痛惜之甚也子曰賢哉回也一簞食一瓢飲孔安國曰簞笥瓢瓠也在陋巷人不堪其憂回也不改其樂賢哉回也孔安國曰顔淵樂道雖簞食在陋巷不改其所樂也冉有曰非不說子之道也力不足也子曰力不足者中道而廢今女畫孔安國曰畫止也力不足者當中道而廢今女自止耳非力極之也子謂子夏曰為君子儒母為小人儒君子為儒將以明道小人為儒則矝其名也子遊為武城宰苞氏曰武城魯下邑也子曰女得人焉耳乎哉孔安國曰焉耳乎哉皆辭也曰有淡臺滅明者行不由徑非公事未嘗至於偃之室也苞氏曰淡臺姓滅明名也字子羽言其公且方也子曰孟之反不伐孔安國曰魯大夫孟之側也與齊戰軍大敗不伐者不自伐其功也奔而殿將入門策其馬曰非敢後也馬不進也馬融曰殿在軍後者也前曰啓後曰殿孟之反賢而有勇軍大奔猶為殿人迎功之不欲獨有其名故曰我非敢在後距敵也馬不能進也子曰不有祝鮀之佞而有宋朝之美難乎免於今之丗矣孔安國曰佞口才也祝鮀衛大夫名子魚也時丗貴之宋朝宋國之美人也而善淫言當如祝鮀佞而反如宋朝之美難矣免於今丗之害也子曰誰能出不由户者何莫由斯道也言人立身成功當由道譬猶人出入要當從户也子曰質勝文則野苞氏曰野如野人言鄙略也文勝質則史苞氏曰史者文多而質少也文質彬彬然後君子苞氏曰彬彬文質相半之貌也子曰人之生也直馬融曰言人之所以生於丗而自終者以其正直之道也罔之生也幸而免苞氏曰誣罔正直之道而亦生是幸而免也子曰知者不如好之者好之者不如樂之者苞氏曰學問知之者不如好之者篤好之者又不如樂之者深也子曰中人以上可以語上也中人以下不可以語上也王肅曰上謂上知之所知也兩舉中人以其可上可下也樊遲問知子曰務民之義王肅曰務所以化導民之義也敬鬼神而逺之可謂知矣苞氏曰敬鬼神而不瀆也問仁子曰仁者先難而後獲可謂仁矣孔安國曰先勞苦乃得功此所以為仁也子曰知者樂水苞氏曰知者樂運其才知以治丗如水流而不知巳之也仁者樂山仁者樂如山之安固自然不動而万物生焉也知者動苞氏曰自進故動也仁者靜孔安國曰無欲故靜也知者樂鄭玄曰知者自􅟕得其志故樂之也仁者壽苞氏曰性靜故壽考也子曰齊一變至於魯魯一變至於道苞氏曰言齊魯有太公周公之餘化也太公大賢周公聖人也今其政教雖衰若有明君興之者齊可使如魯魯可使如大道行之時之也子曰觚不觚馬融曰觚禮器也一升曰爵二升曰觚也觚哉觚哉觚哉觚哉言非觚也以喻為政而不得其道則不成也宰我問曰仁者雖告之曰井有仁者焉其從之也孔安國曰宰我以為仁者必濟人於患難故問有仁人墮井將自投下而出之乎否乎欲極觀仁人憂樂之所至也子曰何為其然也君子可逝也不可陷也苞氏曰逝往也言君子可使往視之耳不肯自投從之也可欺也不可罔也馬融曰可欺者可使往也不可罔者不可得誣罔令自投下也子曰君子博學於文約之以禮亦可以弗畔矣夫鄭玄曰弗畔不違道也子見南子子路不說夫子矢之曰豫所否者天厭之天厭之孔安國曰等以為南子者衛靈公夫人也淫亂而靈公惑之孔子見之者欲因以說靈公使行治道也矢誓也子路不說故夫子誓之曰行道既非婦人之事而弟子不說與之咒誓義可疑也子曰中庸之為德也其至矣乎民鮮久矣庸常也中和可常行之德也丗亂先王之道廢民鮮能行此道久矣非適今也子貢曰如能博施於民而能濟衆者何如可謂仁乎子曰何事於仁必也聖乎堯舜其猶病諸孔安國曰若能廣施恩惠濟民於患難堯舜至聖猶病其難也夫仁者已欲立而立人巳欲達而達人能近取譬可謂仁之方也巳孔安國曰更為子貢說仁者之行也方道也但能近取譬於巳皆恕巳所不欲而勿施於人之也論語卷第三經一千七百一十一字注二千八百二十字
