front:
  text: 論語子張第十九何晏集解凢卄四章九卄五章子張曰士見危致命孔安國曰致命不愛其身也見得思義祭思敬䘮思哀其可巳矣子張曰執徳不弘信道不篤焉能爲有焉能爲亡孔安國曰言無所輕重也子夏之門人問交於子張孔安國曰問問與人交接之道也子張曰子夏云何對曰子夏曰可者與之其不可者距之子張曰異乎吾所聞也君子尊賢而容衆嘉善而矜不能我大賢與於人何所不容我不賢與人將距我如之何其距人也苞氏曰友交當如子夏汎交當如子張也子夏曰雖小道必有可觀者焉小道謂異端也致逺恐泥苞氏曰泥難不通也是以君子不爲也子夏曰日知其所亡孔安國曰日知其所未聞也月無忘其所能可謂好學也巳矣子夏曰博學而䔍志孔安國曰愽學而厚識也切問而近思切問者切問於巳所學而未窹之事也近思者近思巳所能及之事也況問所未學逺思所未達則於所習者不精於所思者不解之仁在其中矣子夏曰百工居肆以成其事君子學以致其道苞氏曰言百工處其肆則事成猶君子學以立其道也子夏曰小人之過也必文孔安國曰文飾其過不言其情實也子夏曰君子有三變望之儼然即之也温聼其言也厲鄭玄曰厲嚴正也子夏曰君子信而後勞其民未信則以爲厲巳也王粛曰厲病也信而後諌未信則以爲謗巳矣子夏曰大徳不踰閑孔安國曰閑猶法也小徳出入可也孔安國曰小徳不能不踰法故曰出入可也子游曰子夏之門人小子當洒掃應對進退則可矣抑未也本之則無如之何苞氏曰言子夏弟子於當對賔客修威儀禮節之事則可然此但是人之未事耳不可無其本也故云本之則無如之何也子夏聞之曰噫孔安國曰噫心不平之聲也言游過矣君子之道孰先傳焉孰後倦焉苞氏曰言先傳大業者必猒倦故我門人先教以小事後將教以大道也譬諸草木區以别矣馬融曰言大道與小道殊異譬如草木異類區别言學當以次也君子之道焉可誣也馬融曰君子之道焉可使誣言我門人但能洒掃而巳也有始有卒者其唯聖人乎孔安國曰終始如一唯聖人耳也子夏曰仕而優則學馬融曰行有餘力則以學文也學而優則仕子游曰䘮致乎哀而止孔安國曰毀不傷性也子游曰吾友張也爲難能也苞氏曰言子張容儀之難及也然而未仁曾子曰堂堂乎張也難與並爲仁矣鄭玄曰言子張容儀威而於仁道薄也曽子曰吾聞諸夫子人未有自致也者必也親䘮乎馬融曰言八雖未能自致盡於他事至於親䘮必自致盡也曽子曰吾聞諸夫子孟莊子之孝也其他可能也其不改攵之臣與父之政是難也馬融曰孟荘子鲁大夫仲孫速也謂在諒闇之中父㠯及父改雖不善者不忍改也孟氏使陽膚爲士師苞氏曰陽膚曽子弟子也士師典獄官也問於曾子曾子曰上失其道民散乆矣如得其情則哀矝而勿喜馬融曰民之離散為輕漂犯法乃上之所為也非民之過也當哀矝之勿之自喜能得其情也子貢曰紂之不善也不如是之甚也是以君子悪居下流天下之悪皆歸焉孔安國曰纣爲不善以䘮天下後丗憎甚之皆以天下之悪歸之於紂也子貢曰君子之過也如日月之蝕也過也人皆見之更也人皆仰之孔安國曰更改也衛公孫朝馬融曰朝衞大夫也問扵子貢曰仲尼焉學子貢曰文武之道未墜扵地在人賢者識其大者不賢者識其小者莫不有文武之道焉夫子焉不學孔安國曰文武之道未墜落扵地賢與不賢各有所識夫子無所不從學也而亦何常師之有孔安國曰無所不從學故無常師也叔孫武叔語大夫扵朝馬融曰鲁大夫叔孫州仇也武謚也曰子貢賢扵仲尼子服景伯以告子貢子貢曰譬諸宮牆也賜之牆也及肩闚見室家之好夫子之牆也數仞不得其門而入者不見宗廟之羙百官之富得其門者或寡矣苞氏曰七尺曰仞也夫子之云不亦冝乎苞氏曰夫子謂武叔也叔孫武叔毀仲尼子貢曰無以爲也仲尼不可毀也他人之賢者丘陵也猶可踰也仲尼如日月也無得而踰焉人雖欲自絶也其何傷於日月乎多見其不知量也言人雖自欲絶棄於日月其何能傷之乎適自見不知量陳子禽謂子貢曰子爲恭也仲尼豈賢於子乎子貢曰君子一言以爲智一言以爲不智言不可不慎也夫子之不可及猶天之不可階而升也夫子得邦家者孔安國曰謂爲諸侯若卿大夫也所謂立之斯立導之斯行綏之斯來動之斯和其生也榮其死也哀如之何其可及也孔安國曰綏安之言孔子爲政其立教則莫不立導之則莫不典行也安之則逺者来至動之則莫不和穆也故能生則見榮顯死則見哀痛矣也論語堯曰第二十何晏集解九三章堯曰咨爾舜天之暦數在爾躬暦數謂列次也允執其中四海困窮天禄永終苞氏曰允信也困極也永長也言爲政信執其中則能窮極四海天禄所以長終也舜亦以命禹孔安國曰舜亦以堯命巳之辭命禹也曰予小子履敢用玄牡敢昭告于皇皇后帝孔安國曰履殷湯名也此伐桀告天文也殷家尚白未變夏禮故用玄牡也皇大也右君也大大君帝謂天帝也墨子引湯誓其辭若此也有罪不敢赦苞氏曰順天奉法有罪者不敢擅赦也帝臣不蔽蕳在帝心言桀居帝臣之位也有罪過不可隱蔽巳蕳在天心也朕躬有罪無以万方万方有罪在朕躬孔安國曰無以万方万方不與也万方有罪我身之過也周有大賚善人是富周周家也賚賜也言周家受天大賜富於善人也有亂臣十人是也雖有周親不如仁人孔安國曰親而不賢不忠則誅管蔡是也仁人箕子微子來則用也百姓有過在予一人謹㩲量審法度修廢官四方之政行焉苞氏曰㩲稱也量斗斛也興滅國继绝丗舉逸民天下之民歸心焉所重民食䘮祭孔安國曰重民國之本也重食民之命也重䘮所以盡哀也重祭所以致敬也寛則得衆敏則有功公則民說孔安國曰言政教公平則民說矣凡此二帝三王所以治也故傳以示後丗也子張問政於孔子曰何如斯可以從政矣子曰尊五羙屏四悪斯可以從政矣孔安國曰屏除也子張曰何謂五羙子曰君子惠而不費勞而不怨欲而不貪㤗而不驕威而不猛子張曰何謂惠而不費子曰因民之所利而利之斯不亦惠而不費乎王粛曰利民在政無費於財也擇其可勞而勞之又誰怨欲仁而得仁又焉貪君子無衆寡無小大無敢慢孔安國曰言君子不以寡小而慢也斯不亦㤗而不驕乎君子正其衣冠尊其瞻視儼然人望而畏之斯不亦威而不猛乎子張曰何謂四悪子曰不教而殺謂之虐不戒視成謂之暴馬融曰不宿戒而責目前成爲視成也慢令致期謂之賊孔安國曰與民無信而虚刻期也猶之與人也出内之吝謂之有司孔安國曰謂財物也俱當與人而吝嗇於出内惜難之此有司之任耳非人君之道也孔子曰不知命無以爲君子也孔安國曰命謂窮達之分也不知禮無以立也不知言無以知人也馬融曰聴言則别其是非也堺浦道祜居士重新命工鏤梓
