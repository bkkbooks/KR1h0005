body:
  text: 論語子罕第九何晏集解凡卅一章皇卅章子罕言利與命與仁罕者希也利者義之和也命者天之命也仁者行之盛也寡能及之故希言也達巷黨人曰大哉孔子博學而無所成名鄭玄曰達巷黨名也五百家為黨此黨之人美孔子博學道藝不成一名而巳也子聞之謂門弟子曰吾何執執御乎執射乎吾執御矣鄭玄曰聞人美之承以謙也吾執御者欲名六藝之卑也子曰麻冕禮也今也純儉吾從衆孔安國曰冕緇布冠也古者績麻三十升布以為之純絲也絲易成故從儉也拜下禮也今拜乎上泰雖違衆吾從下王肅曰臣之與君行禮者下拜然後升成禮時臣驕泰故於上拜今從下禮之恭也子絶四毋意以道為度故不任意也毋必用之則行捨之則截故無專必也毋固無可無不可故無固行也毋我述古而不自作處群萃而不自異唯道是從故不自有其身也子畏於匡苞氏曰匡人誤圍夫子以為陽虎陽虎嘗暴於匡夫子弟子顔尅時又與虎俱往後尅為夫子御至於匡匡人相與共識尅又夫子容貌與虎相似故匡人以兵圍之也曰文王既沒文不在兹乎孔安國曰兹此也言文王雖巳沒其文見在此此自此其身也天之將喪斯文也後死者不得與於斯文也孔安國曰文王既沒故孔子自謂後死也言天將喪此文者本不當使我知之今使我知未欲喪之天之未喪斯文匡人其如豫何馬融曰如豫何者猶言奈我何也天之未喪此文也則我當傳之匡人欲奈我何言其不能違天而害巳也太宰問於子貢曰夫子聖者與何其多能也孔安國曰太宰大夫官名也或具或宋未可分也疑孔子多能於小藝也子貢曰固天縱之將聖又多能也孔安國曰言天固縱之大聖之德又使多能也子聞之曰太宰知我者乎吾少也賤故多能鄙事君子多乎哉不多也苞氏曰我少小貧賤常自執事故多能為鄙人之事君子固不當多能也牢曰子云吾不試故藝鄭玄曰牢弟子子牢也試用也言孔子自云我不見用故多能伎藝也子曰吾有知乎哉無知也知者知意之知也言知者言未必盡也今我誠盡也有鄙夫問於我空空如也我叩其兩端而竭焉孔安國曰有鄙夫來問於我其意空空然我則發事之終始兩端以語之竭盡所知不為有愛也子曰鳯鳥不至河不出圖吾巳矣夫孔安國曰有聖人受命則鳯鳥至河出圖今天無此瑞吾巳矣夫者不得見也河圖八卦是也子見齊衰者冕衣裳者與瞽者苞氏曰冕者冕冠也大夫之服也瞽者盲者也見之雖少者必作過之必趨苞氏曰作起也趨􅍚行也此夫子哀有喪尊在位恤不成人之也顔淵喟然歎曰喟然歎聲也仰之㫆髙鑽之㫆堅言不可窮盡也瞻之在前忽焉在後言忽恍不可為形像也夫子循循然善誘人循循次序貌也誘進也言夫子正以此道勸進人有次序也博我以文約我以禮欲罷不能既竭吾才如有所立卓爾雖欲從之未由也巳孔安國曰言夫子既以文章開博我又以禮節節約我使我欲罷而不能巳竭我才矣其有所立則又卓然不可及言巳雖䝉夫子之善誘猶不能及夫子之所立也子􅍚病苞氏曰􅍚甚曰病也子路使門人為臣鄭玄曰孔子嘗為大夫故子路欲使弟子行其臣之禮也病間曰久矣哉由之行詐也無臣而為有臣吾誰欺欺天乎孔安國曰病小差曰間言子路有是心非唯今日也且豫與其死於臣之手也無寧死於二三子之手乎馬融曰無寧寧也二三子門人也就使我有臣而死其手我寧死弟子之手乎也且豫縱不得大葬孔安國曰君臣禮葬也豫死於道路乎馬融曰就使之不得以君臣之禮葬有二三子在我寧當憂棄於道路乎子貢曰有美玉於斯韞櫝而藏諸求善賈而沽諸馬融曰韞藏也櫝匱也藏諸匱中沽賣也得善賈寧賣之耶也子曰沽之哉沽之哉我待賈者苞氏曰沽之哉不衒賣之辭也我居而待賈者也子欲居九夷馬融曰九夷東方之夷有九種也或曰陋如之何子曰君子居之何陋之有馬融曰君子所居者皆化也子曰吾自衛反於魯然後樂正雅頌各得其所鄭玄曰及魯魯哀公十一年冬也是時道衰樂廢孔子來還乃正之故曰雅頌各得其所也子曰出則事公卿入則事父兄喪事不敢不勉不為酒困何有於我哉馬融曰困亂也子在川上曰逝者如斯夫不舍晝夜苞氏曰逝往也言凡往者如川之㳘也子曰吾未見好德如好色者也􅍚時人薄於德而厚於色也故發此言也子曰譬如為山未成一簣止吾止也苞氏曰簣圡籠也此勸人進於道德也為山者其功雖巳多未成一籠而中道止者我不以其前功多而善之見其志不遂故不與也譬如平地雖覆一簣進吾往也馬融曰平地者將進加功雖始覆一簣我不以其見功少而薄之也據其欲進而與之也子曰語之而不惰者其回與顔淵則解故語之不惰餘人不解故有惰語之時也子謂顔淵曰惜乎吾見其進也未見其止也苞氏曰孔子謂顔淵進益未止痛惜之甚也子曰苗而不秀者有矣夫秀而不實者有矣夫孔安國曰言万物有生而不育成者喻人亦然也子曰後生可畏也焉知來者之不如今也後生謂年少也四十五十而無聞焉斯亦不足畏也巳矣子曰法語之言能無從乎改之為貴孔安國曰人有過以正道告之口無不順從之能必改乃為貴也矣巽與之言能無說乎繹之為貴馬融曰巽恭也謂恭巽謹敬之言聞之無不悅也能尋繹行之乃為貴也恱而不繹從而不改吾末如之何也巳矣子曰主忠信無友不如巳者過則勿憚改慎其所主所友有過務改皆所以為益也子曰三軍可奪帥也匹夫不可奪志也孔安國曰三軍雖衆人心非一則其將帥可奪之而取匹夫雖微苟守其志不可得而奪也子曰衣弊緼𫀆與衣狐狢者立而不耻者其由與孔安國曰緼枲著也不忮不求何用不臧馬融曰忮害也臧善也言不忮害不貪求何用為不善疾貪惡忮害之詩也子路終身誦之子曰是道也何足以臧馬融曰臧善也尚復有美於是者何足以為善也子曰歲寒然後知松柏之後雕也大寒之歲衆木皆死然後知松柏小雕傷也平嵗則衆木亦有不死者故須歲寒而後别之喻凡人處治丗亦能自修整與君子同在濁丗然後知君子之正不苟容也子曰知者不惑苞氏曰不惑亂也仁者不憂孔安國曰無憂患也勇者不懼子曰可與共學未可與適道適之也雖學或得異端未必能之道也可與適道未可與立雖能之道未必能以有所成立也可與立未可與權雖能有所立未必能權量其輕重之極也唐棣之華偏其反而豈不爾思室是逺而逸詩也唐棣栘也華反而後合賦此詩以言權道反而後至大順也思其人而不得見者其室逺也以言思權而不得見者其道逺也子曰未之思也夫何逺之有哉夫思者當思其反反是不思所以為逺也能思其反何逺之有言權可知唯不知思耳思之有次序斯可知之也論語卿黨第十何晏集解凡一章孔子於鄉黨恂恂如也似不能言者王肅曰恂恂溫恭之貌也其在宗廟朝廷便便言唯謹爾鄭玄曰便便辦也雖辦而謹敬也朝與下大夫言侃侃如也孔安國曰侃侃和樂之貌也與上大夫言誾誾如也孔安國曰誾誾中正之貌也君在踧踖如也與與如也馬融曰君在者君視朝也踧踖恭敬之貌也與與威儀中適之貌也君召使擯鄭玄曰君召使擯者有賔客使迎也色勃如也孔安國曰必變色也足躩如也苞氏曰槃辟貌之也揖所與立左右其手衣前後䄡如也鄭玄曰揖左人左其手揖右人右其手一俯一仰故衣前後則䄡如也趨進翼如也孔安國曰言端好也賔退必𣸪命曰賔不顧矣孔安國曰復命白君賔已去也矣入公門鞠躬如也如不容孔安國曰斂身也立不中門行不履閾孔安國曰閾門限也過位色勃如也足躩如也苞氏曰過君之空位也其言似不足者攝齊升堂鞠躬如也屏氣似不息者孔安國曰皆重慎也衣下曰齊攝齊者摳衣也出降一䒭逞顔色怡怡如也孔安國曰先屏氣下階舒氣故怡怡如也沒階趨進翼如也孔安國曰沒盡也下盡階也復其位踧踖如也孔安國曰來時所過位也執圭鞠躬如也如不勝苞氏曰為君使以聘問鄰國執持君之圭鞠躬者敬慎之至也上如揖下如授勃如戰色足蹜蹜如有循也鄭玄曰上如揖授玉冝敬也下如授不敢忘禮戰色敬也足蹜蹜如有循舉前曳踵行之也享禮有容色鄭玄曰享獻也聘禮既聘而享享用圭璧有庭實也私覿愈愈如也鄭玄曰覿見也既享乃以私禮見愈愈顔色之和也君子不以紺緅飾孔安國曰一入曰緅飾者不以為領袖緣也紺者齊服盛色以為飾似衣齊服也緅者三年練以緅飾衣為其似衣喪服故皆不以飾衣也紅紫不以為䙝服王肅曰䙝服私居非公㑹之服者也皆不正䙝尚不衣正服無所施也當暑縝絺綌必表而出孔安國曰暑則單服絺絡葛也必表而出加上衣也緇衣羔裘素衣麑裘黃衣狐裘䙝裘長短右𬒮孔安國曰服皆中外之色相稱也私家裘長生溫也短右𬒮者便作事也必有寢衣長一身有半孔安國曰今之𬒳也狐狢之厚以居鄭玄曰在家以接賔客之也去喪無所不佩孔安國曰去除也非喪則備佩所冝佩也非惟裳必殺之王肅曰衣必有殺縫唯惟裳無殺之也羔裘玄冠不以弔孔安國曰喪主素吉主玄吉凶異服故不相弔也吉月必朝服而朝孔安國曰吉月月朔也朝服皮辨服也齊必有明衣布也孔安國曰以布為沐浴之衣也齊必變食孔安國曰改常食也居必遷坐孔安國曰易常處也食不厭精膾不厭細食饐而餲孔安國曰饐餲臭味變也魚餒而肉敗不食孔安國曰魚敗曰餒也色惡不食臭惡不食失飪不食孔安國曰失飪失生熟之節也不時不食鄭玄曰不時非朝夕日中時也割不正不食不得其醬不食馬融曰魚膾非芥醬不食也肉雖多不使勝食氣唯酒無量不及亂沽酒市脯不食不撤薑食孔安國曰撤去也齊禁薰物薑辛不臭故不去也不多食孔安國曰不過飽祭於公不宿肉周生烈曰助祭於君所得牲體歸則以班賜不留神惠也祭肉不出三日出三日不食之矣鄭玄曰自其家祭肉也過三日不食也是褻鬼神之餘也食不語寢不言雖疏食菜羹瓜祭必齊如也孔安國曰齊嚴敬之貌也三物雖薄祭之必敬也席不正不㘴鄉人飲酒杖者出斯出矣孔安國曰杖者老人也鄉人飲酒之禮主於老者老者禮畢出孔子從而出之鄉人儺朝服而立阼階孔安國曰儺驅逐疫鬼也恐驚先祖故朝服立於廣之阼階也問人於他邦再拜送之孔安國曰拜送使者敬也康子饋藥拜而受之苞氏曰遺孔子藥也曰丘未達不敢嘗之孔安國曰未知其故故不嘗禮也廄焚子退朝曰傷人乎不問馬鄭玄曰重人賤畜也退朝自魯君之朝來歸君賜食必正席先嘗孔安國曰敬君之惠也既嘗之乃以班賜之也君賜腥必熟而薦之孔安國曰薦薦其先祖也君賜生必畜之侍食於君君祭先飯鄭玄曰於君祭則先飲矣若為先嘗食然也疾君視之東首加朝服拖紳苞氏曰夫子疾也處南牗之下東首加其朝服拖紳紳太帶不敢不衣朝服見君也君命召不俟駕行矣鄭玄曰急趨君命也行出而車既駕從也入太廟每事問鄭玄曰為君助祭也大廟周公廟也朋友死無所歸曰於我殯孔安國曰重朋友之恩也無所歸無親昵也朋友之饋雖車馬非祭肉不拜孔安國曰不拜有通財之義也寢不尸苞氏曰偃卧四體布展手足似死人也居不容孔安國曰為家室之敬難久也子見齊衰者雖狎必變孔安國曰狎者素親狎也見冕者與瞽者雖䙝必以貌周生烈曰䙝謂數相見也必當以貌禮也凶服者式之式負版者孔安國曰凶服者送死之衣物也負版者持邦國之圖籍者也有盛饌必變色而作孔安國曰作起也敬主人之親饋也迅雷風烈必變鄭玄曰敬天之怒風疾雷為烈也升車必正立執綏周生烈曰必正立執綏所以為安也車中不內顧苞氏曰車中不內顧者前視不過衡扼傍視不過輢轂之也不疾言不親指色斯舉矣馬融曰見顔色不善則去之也翔而後集周生烈曰廽翔審觀而後下止也曰山梁雌雉時哉時哉子路供之三嗅而作言山梁雌雉得其時而人不得時故歎之子路以其時物故供具之非其本意不苟食故三嗅而起也論語卷第五經一千四百六十二字注二千二百九十七字
